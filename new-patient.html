<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>悅心診所 初診資料</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  :root {
    --green: #7AAB5A;
    --green-light: #EEF4E8;
    --green-dark: #5a8a3a;
    --text: #2d3a2e;
    --text-light: #6b7c6d;
    --border: #d4e4c8;
    --bg: #f8faf6;
    --white: #ffffff;
    --error: #c0392b;
    --shadow: 0 2px 16px rgba(122,171,90,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: 40px;
  }
  .header {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 16px 20px; text-align: center;
    position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow);
  }
  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; font-weight: 500;
    color: var(--green-dark); letter-spacing: 2px;
  }
  .header p { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
  .card {
    background: var(--white); border-radius: 16px;
    padding: 24px 20px; box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px; font-weight: 500; color: var(--green-dark);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    line-height: 1.5;
  }
  .card-title::before {
    content: ''; width: 3px; min-width: 3px; height: 16px;
    background: var(--green); border-radius: 2px;
  }
  .form-group { margin-bottom: 20px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label {
    display: block; font-size: 13px;
    color: var(--text-light); margin-bottom: 8px; font-weight: 500;
  }
  .form-label .required { color: var(--error); margin-left: 2px; }
  .sub-hint { font-size: 12px; color: #aaa; margin-bottom: 10px; line-height: 1.5; }
  textarea {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    color: var(--text); background: var(--white);
    transition: border-color 0.2s; outline: none;
    min-height: 90px; resize: vertical; line-height: 1.6;
  }
  textarea:focus { border-color: var(--green); }
  textarea::placeholder { color: #bbb; }
  .other-input {
    display: none; margin-top: 8px; width: 100%;
    padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif; outline: none;
  }
  .other-input:focus { border-color: var(--green); }
  .other-input.show { display: block; }

  .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 10px; }
  .radio-option, .checkbox-option {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }
  .radio-option:hover, .checkbox-option:hover {
    border-color: var(--green); background: var(--green-light);
  }
  .radio-option input, .checkbox-option input { display: none; }
  .radio-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .check-box {
    width: 18px; height: 18px; border-radius: 4px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
    font-size: 11px; color: transparent;
  }
  .radio-option.selected { border-color: var(--green); background: var(--green-light); }
  .radio-option.selected .radio-dot { border-color: var(--green); background: var(--green); }
  .radio-option.selected .radio-dot::after {
    content: ''; width: 6px; height: 6px; border-radius: 50%; background: white;
  }
  .checkbox-option.selected { border-color: var(--green); background: var(--green-light); }
  .checkbox-option.selected .check-box {
    border-color: var(--green); background: var(--green); color: white;
  }
  .radio-label, .checkbox-label { font-size: 14px; color: var(--text); line-height: 1.4; }

  .alert {
    padding: 12px 14px; border-radius: 10px;
    font-size: 15px; margin-bottom: 16px; line-height: 1.6;
  }
  .alert-info { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--border); }
  .alert-error { background: #fdf0ef; color: var(--error); border: 1px solid #f5c6c2; }

  .btn {
    width: 100%; padding: 16px; border: none; border-radius: 12px;
    font-size: 16px; font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
    letter-spacing: 1px; margin-bottom: 10px;
  }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-skip {
    background: transparent; color: var(--text-light);
    font-size: 14px; border: none; padding: 8px;
    text-decoration: underline; cursor: pointer;
    width: 100%; text-align: center;
  }
  .success-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 16px;
  }
  .success-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px; font-weight: 500;
    color: var(--green-dark); text-align: center; margin-bottom: 8px;
  }
  .success-sub {
    text-align: center; font-size: 13px;
    color: var(--text-light); line-height: 1.6;
  }
  .page { display: none; }
  .page.active { display: block; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1>悅心診所</h1>
  <p>初診資料填寫</p>
</div>

<div class="container">

  <div class="page active" id="pageForm">
    <div class="alert alert-info">
      🌱 以下資料將協助醫師在初診前了解您的狀況，讓看診更有效率。
    </div>

    <!-- Q1 怎麼知道悅心診所 -->
    <div class="card">
      <div class="card-title">怎麼知道悅心診所呢？</div>
      <div class="form-group">
        <div class="radio-group" id="referralGroup">
          <label class="radio-option" onclick="selectRadio('referral','親友推薦')">
            <input type="radio" name="referral" value="親友推薦">
            <div class="radio-dot"></div>
            <span class="radio-label">親友推薦</span>
          </label>
          <label class="radio-option" onclick="selectRadio('referral','網路搜尋（Google、Google 地圖、AI 推薦等）')">
            <input type="radio" name="referral" value="網路搜尋（Google、Google 地圖、AI 推薦等）">
            <div class="radio-dot"></div>
            <span class="radio-label">網路搜尋（Google、Google 地圖、AI 推薦等）</span>
          </label>
          <label class="radio-option" onclick="selectRadio('referral','社群媒體（Facebook、Instagram、Threads、Dcard、PTT 等）')">
            <input type="radio" name="referral" value="社群媒體（Facebook、Instagram、Threads、Dcard、PTT 等）">
            <div class="radio-dot"></div>
            <span class="radio-label">社群媒體（Facebook、Instagram、Threads、Dcard、PTT 等）</span>
          </label>
          <label class="radio-option" onclick="selectRadio('referral','醫師或心理師轉介')">
            <input type="radio" name="referral" value="醫師或心理師轉介">
            <div class="radio-dot"></div>
            <span class="radio-label">醫師或心理師轉介</span>
          </label>
          <label class="radio-option" onclick="selectRadio('referral','路過／住家或公司附近')">
            <input type="radio" name="referral" value="路過／住家或公司附近">
            <div class="radio-dot"></div>
            <span class="radio-label">路過／住家或公司附近</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q2 第一次看身心科 -->
    <div class="card">
      <div class="card-title">這是您第一次看身心科嗎？</div>
      <div class="form-group">
        <div class="radio-group" id="firstVisitGroup">
          <label class="radio-option" onclick="selectRadio('firstVisit','是的，這是我第一次看身心科')">
            <input type="radio" name="firstVisit" value="是的，這是我第一次看身心科">
            <div class="radio-dot"></div>
            <span class="radio-label">是的，這是我第一次看身心科</span>
          </label>
          <label class="radio-option" onclick="selectRadio('firstVisit','否，我之前有看過身心科或接受過心理諮商／治療')">
            <input type="radio" name="firstVisit" value="否，我之前有看過身心科或接受過心理諮商／治療">
            <div class="radio-dot"></div>
            <span class="radio-label">否，我之前有看過身心科或接受過心理諮商／治療</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q3 今天想談的大方向 -->
    <div class="card">
      <div class="card-title">今天想來討論的大方向是？（可複選）</div>
      <div class="form-group">
        <div class="checkbox-group" id="topicGroup">
          <label class="checkbox-option" onclick="toggleTopic(this)">
            <div class="check-box">✓</div>
            <span class="checkbox-label">睡眠狀況（如：難入睡、淺眠、多夢、早醒）</span>
          </label>
          <label class="checkbox-option" onclick="toggleTopic(this)">
            <div class="check-box">✓</div>
            <span class="checkbox-label">情緒困擾（如：心情低落、容易落淚、焦慮、煩躁、易怒）</span>
          </label>
          <label class="checkbox-option" onclick="toggleTopic(this)">
            <div class="check-box">✓</div>
            <span class="checkbox-label">壓力調適（如：工作、學業、經濟或生活轉變壓力）</span>
          </label>
          <label class="checkbox-option" onclick="toggleTopic(this)">
            <div class="check-box">✓</div>
            <span class="checkbox-label">人際與家庭關係（如：伴侶、親子、職場人際溝通）</span>
          </label>
          <label class="checkbox-option" onclick="toggleTopic(this)">
            <div class="check-box">✓</div>
            <span class="checkbox-label">專注力或記憶力（如：無法集中精神、忘東忘西、疑似 ADHD）</span>
          </label>
          <label class="checkbox-option" onclick="toggleTopic(this)">
            <div class="check-box">✓</div>
            <span class="checkbox-label">自律神經或身體不適（如：心悸、胸悶、恐慌、查無病因的身體不舒服）</span>
          </label>
          <label class="checkbox-option" onclick="toggleTopic(this)">
            <div class="check-box">✓</div>
            <span class="checkbox-label">其他（請於看診時向醫師說明）</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q4 希望的協助方式 -->
    <div class="card">
      <div class="card-title">您比較希望的協助方式是？</div>
      <div class="form-group">
        <div class="radio-group" id="preferenceGroup">
          <label class="radio-option" onclick="selectRadio('preference','希望以醫師評估、開立藥物緩解症狀為主')">
            <input type="radio" name="preference" value="希望以醫師評估、開立藥物緩解症狀為主">
            <div class="radio-dot"></div>
            <span class="radio-label">希望以醫師評估、開立藥物緩解症狀為主</span>
          </label>
          <label class="radio-option" onclick="selectRadio('preference','希望先盡量不吃藥，以討論心理狀態與生活調整為主')">
            <input type="radio" name="preference" value="希望先盡量不吃藥，以討論心理狀態與生活調整為主">
            <div class="radio-dot"></div>
            <span class="radio-label">希望先盡量不吃藥，以討論心理狀態與生活調整為主</span>
          </label>
          <label class="radio-option" onclick="selectRadio('preference','藥物協助與心理討論，兩者都希望進行')">
            <input type="radio" name="preference" value="藥物協助與心理討論，兩者都希望進行">
            <div class="radio-dot"></div>
            <span class="radio-label">藥物協助與心理討論，兩者都希望進行</span>
          </label>
          <label class="radio-option" onclick="selectRadio('preference','目前還不確定，希望由醫師評估與建議')">
            <input type="radio" name="preference" value="目前還不確定，希望由醫師評估與建議">
            <div class="radio-dot"></div>
            <span class="radio-label">目前還不確定，希望由醫師評估與建議</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q5 診斷證明書 -->
    <div class="card">
      <div class="card-title">本次看診是否需要開立診斷證明書？</div>
      <div class="form-group">
        <div class="radio-group" id="certGroup">
          <label class="radio-option" onclick="selectRadio('cert','需要（用於請假、保險、兵役、學校等用途）')">
            <input type="radio" name="cert" value="需要（用於請假、保險、兵役、學校等用途）">
            <div class="radio-dot"></div>
            <span class="radio-label">需要（用於請假、保險、兵役、學校等用途）</span>
          </label>
          <label class="radio-option" onclick="selectRadio('cert','不需要')">
            <input type="radio" name="cert" value="不需要">
            <div class="radio-dot"></div>
            <span class="radio-label">不需要</span>
          </label>
          <label class="radio-option" onclick="selectRadio('cert','還不確定，想先跟醫師討論')">
            <input type="radio" name="cert" value="還不確定，想先跟醫師討論">
            <div class="radio-dot"></div>
            <span class="radio-label">還不確定，想先跟醫師討論</span>
          </label>
        </div>
      </div>
    </div>

    <div id="errorForm" class="alert alert-error" style="display:none"></div>
    <button class="btn btn-primary" id="btnSubmitNew" onclick="submitNewPatient()">送出資料</button>
    <button class="btn-skip" onclick="skipNewPatient()">略過</button>
  </div>

  <!-- Success Page -->
  <div class="page" id="pageSuccess">
    <div class="card" style="text-align:center;padding:32px 20px">
      <div class="success-icon">🌱</div>
      <div class="success-title">初診資料已送出</div>
      <div class="success-sub">
        感謝您填寫初診資料<br>
        醫師將在看診前閱覽您的資料<br>
        期待在悅心診所與您見面 ✨
      </div>
    </div>
    <button class="btn btn-secondary" onclick="closeLiff()" style="display:none;margin-top:16px">關閉</button>
    <button class="btn btn-outline" onclick="goToEntry()" style="margin-top:16px">返回首頁</button>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz1IB0HCFWaFlC7odExNsOWaZwTjz7osAjstXhx_5V0ZD4Ya58GGRRPfFAun2Itywbh6A/exec";

const urlParams = new URLSearchParams(window.location.search);
const bookingId = decodeURIComponent(urlParams.get("bookingId") || "");
const name = decodeURIComponent(urlParams.get("name") || "");
const lineId = decodeURIComponent(urlParams.get("lineId") || "");

const radioState = { referral: "", firstVisit: "", preference: "", cert: "" };
let selectedTopics = [];

// ===================================
// Radio 選擇
// ===================================
function selectRadio(group, val) {
  radioState[group] = val;
  const groupEl = document.getElementById(group + "Group");
  if (!groupEl) return;
  groupEl.querySelectorAll(".radio-option").forEach(function(el) {
    el.classList.toggle("selected", el.querySelector("input").value === val);
  });
}

// ===================================
// Checkbox（Q3 大方向）
// ===================================
function toggleTopic(el) {
  el.classList.toggle("selected");
  selectedTopics = [];
  document.querySelectorAll("#topicGroup .checkbox-option.selected").forEach(function(opt) {
    selectedTopics.push(opt.querySelector(".checkbox-label").textContent.trim());
  });
}

// ===================================
// 送出
// ===================================
async function submitNewPatient() {
  if (!radioState.firstVisit) return showError("請選擇這是否是您第一次看身心科");
  if (selectedTopics.length === 0) return showError("請至少選擇一個今天想討論的大方向");
  if (!radioState.preference) return showError("請選擇您希望的協助方式");
  if (!radioState.cert) return showError("請選擇是否需要診斷證明書");

  const btn = document.getElementById("btnSubmitNew");
  btn.disabled = true; btn.textContent = "送出中...";

  try {
    const payload = {
      action: "submitNewPatient",
      bookingId: bookingId,
      name: name,
      lineId: lineId,
      referral: radioState.referral || "",
      firstVisit: radioState.firstVisit,
      topics: selectedTopics.join("；"),
      preference: radioState.preference,
      cert: radioState.cert
    };
    const data = await xhrPost(API_URL, payload);
    if (!data.success) throw new Error(data.error);
    showSuccess();
  } catch(e) {
    showError("送出失敗，請重試");
    btn.disabled = false; btn.textContent = "送出資料";
  }
}

function skipNewPatient() { showSuccess(); }

function showSuccess() {
  document.getElementById("pageForm").classList.remove("active");
  document.getElementById("pageSuccess").classList.add("active");
  window.scrollTo(0, 0);
}

function showError(msg) {
  const el = document.getElementById("errorForm");
  el.textContent = msg; el.style.display = "block";
  el.scrollIntoView({ behavior: "smooth", block: "center" });
}

function xhrGet(url) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);
    xhr.onload = function() {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch(e) { reject(e); }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.send();
  });
}

function xhrPost(url, payload) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open("POST", url, true);
    xhr.setRequestHeader("Content-Type", "text/plain");
    xhr.onload = function() {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch(e) { reject(e); }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.send(JSON.stringify(payload));
  });
}

function goToEntry() {
  window.location.href = "booking.html";
}

function closeLiff() {
  if (typeof liff !== "undefined" && liff.isInClient()) {
    liff.closeWindow();
  } else {
    window.close();
  }
}
</script>

</body>
</html>
