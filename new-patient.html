<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>悅心診所 初診資料</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  :root {
    --green: #7AAB5A;
    --green-light: #EEF4E8;
    --green-dark: #5a8a3a;
    --text: #2d3a2e;
    --text-light: #6b7c6d;
    --border: #d4e4c8;
    --bg: #f8faf6;
    --white: #ffffff;
    --error: #c0392b;
    --shadow: 0 2px 16px rgba(122,171,90,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: 40px;
  }
  .header {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 16px 20px; text-align: center;
    position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow);
  }
  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; font-weight: 500;
    color: var(--green-dark); letter-spacing: 2px;
  }
  .header p { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
  .card {
    background: var(--white); border-radius: 16px;
    padding: 24px 20px; box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px; font-weight: 500; color: var(--green-dark);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    line-height: 1.5;
  }
  .card-title::before {
    content: ''; width: 3px; min-width: 3px; height: 16px;
    background: var(--green); border-radius: 2px;
  }
  .form-group { margin-bottom: 20px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label {
    display: block; font-size: 13px;
    color: var(--text-light); margin-bottom: 8px; font-weight: 500;
  }
  .form-label .required { color: var(--error); margin-left: 2px; }
  .sub-hint { font-size: 12px; color: #aaa; margin-bottom: 10px; line-height: 1.5; }
  textarea {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 16px; font-family: 'Noto Sans TC', sans-serif;
    color: var(--text); background: var(--white);
    transition: border-color 0.2s; outline: none;
    min-height: 90px; resize: vertical; line-height: 1.6;
  }
  textarea:focus { border-color: var(--green); }
  textarea::placeholder { color: #bbb; }
  .other-input {
    display: none; margin-top: 8px; width: 100%;
    padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 16px;
    font-family: 'Noto Sans TC', sans-serif; outline: none;
  }
  .other-input:focus { border-color: var(--green); }
  .other-input.show { display: block; }

  .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 10px; }
  .radio-option, .checkbox-option {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }
  .radio-option:hover, .checkbox-option:hover {
    border-color: var(--green); background: var(--green-light);
  }
  .radio-option input, .checkbox-option input { display: none; }
  .radio-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .check-box {
    width: 18px; height: 18px; border-radius: 4px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
    font-size: 11px; color: transparent;
  }
  .radio-option.selected { border-color: var(--green); background: var(--green-light); }
  .radio-option.selected .radio-dot { border-color: var(--green); background: var(--green); }
  .radio-option.selected .radio-dot::after {
    content: ''; width: 6px; height: 6px; border-radius: 50%; background: white;
  }
  .checkbox-option.selected { border-color: var(--green); background: var(--green-light); }
  .checkbox-option.selected .check-box {
    border-color: var(--green); background: var(--green); color: white;
  }
  .radio-label, .checkbox-label { font-size: 14px; color: var(--text); line-height: 1.4; }

  .alert {
    padding: 12px 14px; border-radius: 10px;
    font-size: 15px; margin-bottom: 16px; line-height: 1.6;
  }
  .alert-info { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--border); }
  .alert-error { background: #fdf0ef; color: var(--error); border: 1px solid #f5c6c2; }

  .btn {
    width: 100%; padding: 16px; border: none; border-radius: 12px;
    font-size: 16px; font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
    letter-spacing: 1px; margin-bottom: 10px;
  }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-skip {
    background: transparent; color: var(--text-light);
    font-size: 15px; border: none; padding: 8px;
    text-decoration: underline; cursor: pointer;
    width: 100%; text-align: center;
  }
  .success-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 16px;
  }
  .success-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px; font-weight: 500;
    color: var(--green-dark); text-align: center; margin-bottom: 8px;
  }
  .success-sub {
    text-align: center; font-size: 13px;
    color: var(--text-light); line-height: 1.6;
  }
  .page { display: none; }
  .page.active { display: block; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1>悅心診所</h1>
  <p>初診資料填寫</p>
</div>

<div class="container">

  <div class="page active" id="pageForm">
    <div class="alert alert-info">
      🌱 以下基本資料將協助診所提供更適合您的預約與服務安排。
    </div>

    <!-- Q1 怎麼知道悅心診所 -->
    <div class="card">
      <div class="card-title">怎麼知道悅心診所呢？</div>
      <div class="form-group">
        <div class="radio-group" id="referralGroup">
          <label class="radio-option" onclick="selectRadio('referral','親友推薦')">
            <input type="radio" name="referral" value="親友推薦">
            <div class="radio-dot"></div>
            <span class="radio-label">親友推薦</span>
          </label>
          <label class="radio-option" onclick="selectRadio('referral','網路搜尋（Google、地圖等）')">
            <input type="radio" name="referral" value="網路搜尋（Google、地圖等）">
            <div class="radio-dot"></div>
            <span class="radio-label">網路搜尋（Google、地圖等）</span>
          </label>
          <label class="radio-option" onclick="selectRadio('referral','社群媒體（FB、IG、Threads等）')">
            <input type="radio" name="referral" value="社群媒體（FB、IG、Threads等）">
            <div class="radio-dot"></div>
            <span class="radio-label">社群媒體（FB、IG、Threads等）</span>
          </label>
          <label class="radio-option" onclick="selectRadio('referral','醫師或心理師轉介')">
            <input type="radio" name="referral" value="醫師或心理師轉介">
            <div class="radio-dot"></div>
            <span class="radio-label">醫師或心理師轉介</span>
          </label>
          <label class="radio-option" onclick="selectRadio('referral','路過或住家附近')">
            <input type="radio" name="referral" value="路過或住家附近">
            <div class="radio-dot"></div>
            <span class="radio-label">路過或住家附近</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q2 是否已成年 -->
    <div class="card">
      <div class="card-title">是否已成年？</div>
      <div class="form-group">
        <div class="radio-group" id="isAdultGroup">
          <label class="radio-option" onclick="selectRadio('isAdult','是，我已年滿18歲。')">
            <input type="radio" name="isAdult" value="是，我已年滿18歲。">
            <div class="radio-dot"></div>
            <span class="radio-label">是，我已年滿18歲。</span>
          </label>
          <label class="radio-option" onclick="selectRadio('isAdult','否，我尚未年滿18歲。')">
            <input type="radio" name="isAdult" value="否，我尚未年滿18歲。">
            <div class="radio-dot"></div>
            <span class="radio-label">否，我尚未年滿18歲。</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q3 目前居住地 -->
    <div class="card">
      <div class="card-title">目前居住地？</div>
      <div class="form-group">
        <div class="radio-group" id="residenceGroup">
          <label class="radio-option" onclick="selectRadio('residence','高雄市楠梓區')">
            <input type="radio" name="residence" value="高雄市楠梓區">
            <div class="radio-dot"></div>
            <span class="radio-label">高雄市楠梓區</span>
          </label>
          <label class="radio-option" onclick="selectRadio('residence','高雄市其他行政區')">
            <input type="radio" name="residence" value="高雄市其他行政區">
            <div class="radio-dot"></div>
            <span class="radio-label">高雄市其他行政區</span>
          </label>
          <label class="radio-option" onclick="selectRadio('residence','外縣市')">
            <input type="radio" name="residence" value="外縣市">
            <div class="radio-dot"></div>
            <span class="radio-label">外縣市</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q4 同住狀況（複選，含互斥邏輯） -->
    <div class="card">
      <div class="card-title">您目前的同住狀況為？（可複選）</div>
      <div class="form-group">
        <div class="checkbox-group" id="livingWithGroup">
          <label class="checkbox-option" onclick="toggleLivingWith(this, '獨居')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">獨居</span>
          </label>
          <label class="checkbox-option" onclick="toggleLivingWith(this, '與伴侶或配偶同住')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">與伴侶或配偶同住</span>
          </label>
          <label class="checkbox-option" onclick="toggleLivingWith(this, '與父母或長輩同住')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">與父母或長輩同住</span>
          </label>
          <label class="checkbox-option" onclick="toggleLivingWith(this, '與小孩同住')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">與小孩同住</span>
          </label>
          <label class="checkbox-option" onclick="toggleLivingWith(this, '與室友或朋友同住')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">與室友或朋友同住</span>
          </label>
          <label class="checkbox-option" onclick="toggleLivingWith(this, '與兄弟姊妹同住')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">與兄弟姊妹同住</span>
          </label>
          <label class="checkbox-option" onclick="toggleLivingWith(this, '住宿舍（學校或公司）')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">住宿舍（學校或公司）</span>
          </label>
          <label class="checkbox-option" onclick="toggleLivingWith(this, '其他（不屬於以上任一狀況）')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">其他（不屬於以上任一狀況）</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q5 職業作息 -->
    <div class="card">
      <div class="card-title">您的職業與作息型態是？</div>
      <div class="form-group">
        <div class="radio-group" id="occupationGroup">
          <label class="radio-option" onclick="selectRadio('occupation','一般白天上班族')">
            <input type="radio" name="occupation" value="一般白天上班族">
            <div class="radio-dot"></div>
            <span class="radio-label">一般白天上班族</span>
          </label>
          <label class="radio-option" onclick="selectRadio('occupation','輪班或夜班工作者')">
            <input type="radio" name="occupation" value="輪班或夜班工作者">
            <div class="radio-dot"></div>
            <span class="radio-label">輪班或夜班工作者</span>
          </label>
          <label class="radio-option" onclick="selectRadio('occupation','學生')">
            <input type="radio" name="occupation" value="學生">
            <div class="radio-dot"></div>
            <span class="radio-label">學生</span>
          </label>
          <label class="radio-option" onclick="selectRadio('occupation','家管或全職照顧者')">
            <input type="radio" name="occupation" value="家管或全職照顧者">
            <div class="radio-dot"></div>
            <span class="radio-label">家管或全職照顧者</span>
          </label>
          <label class="radio-option" onclick="selectRadio('occupation','自由業或彈性工時')">
            <input type="radio" name="occupation" value="自由業或彈性工時">
            <div class="radio-dot"></div>
            <span class="radio-label">自由業或彈性工時</span>
          </label>
          <label class="radio-option" onclick="selectRadio('occupation','待業、待產或退休')">
            <input type="radio" name="occupation" value="待業、待產或退休">
            <div class="radio-dot"></div>
            <span class="radio-label">待業、待產或退休</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q6 方便時段（複選） -->
    <div class="card">
      <div class="card-title">未來若需安排回診，比較方便的時段是？（可複選）</div>
      <div class="form-group">
        <div class="checkbox-group" id="availableTimeGroup">
          <label class="checkbox-option" onclick="toggleAvailableTime(this, '平日早上')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">平日早上</span>
          </label>
          <label class="checkbox-option" onclick="toggleAvailableTime(this, '平日下午')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">平日下午</span>
          </label>
          <label class="checkbox-option" onclick="toggleAvailableTime(this, '平日晚上')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">平日晚上</span>
          </label>
          <label class="checkbox-option" onclick="toggleAvailableTime(this, '週六早上')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">週六早上</span>
          </label>
          <label class="checkbox-option" id="optFlexible" onclick="toggleAvailableTime(this, '排班不固定，需視情況而定')">
            <div class="check-box">✓</div>
            <span class="checkbox-label">排班不固定，需視情況而定</span>
          </label>
        </div>
      </div>
    </div>

    <div id="errorForm" class="alert alert-error" style="display:none"></div>
    <p style="font-size:11px;color:var(--text-light);text-align:center;margin-bottom:12px;line-height:1.6;">
      送出問卷即表示同意悅心診所蒐集、保存您的資料，僅供門診預約與醫療行政使用。
    </p>
    <button class="btn btn-primary" id="btnSubmitNew" onclick="submitNewPatient()">送出資料</button>
    <button class="btn-skip" onclick="skipNewPatient()">略過不填</button>
  </div>

  <!-- Success Page -->
  <div class="page" id="pageSuccess">
    <div class="card" style="text-align:center;padding:32px 20px">
      <div class="success-icon">🌱</div>
      <div class="success-title">初診資料已送出</div>
      <div class="success-sub">
        感謝您填寫初診資料<br>
        醫師將在看診前閱覽您的資料<br>
        期待在悅心診所與您見面 ✨
      </div>
    </div>
    <button class="btn btn-secondary" onclick="closeLiff()" style="display:none;margin-top:16px">關閉</button>
    <button class="btn btn-outline" onclick="goToEntry()" style="margin-top:16px">返回首頁</button>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz1IB0HCFWaFlC7odExNsOWaZwTjz7osAjstXhx_5V0ZD4Ya58GGRRPfFAun2Itywbh6A/exec";

const urlParams = new URLSearchParams(window.location.search);
const bookingId = decodeURIComponent(urlParams.get("bookingId") || "");
const name = decodeURIComponent(urlParams.get("name") || "");
const lineId = decodeURIComponent(urlParams.get("lineId") || "");
const apptDate = urlParams.get("apptDate") || "";

const radioState = { referral: "", isAdult: "", residence: "", occupation: "", livingWith: "" };
let selectedAvailableTime = [];
let isSubmitting = false; // 防連點全域旗標

// ===================================
// Radio 選擇
// ===================================
function selectRadio(group, val) {
  radioState[group] = val;
  const groupEl = document.getElementById(group + "Group");
  if (!groupEl) return;
  groupEl.querySelectorAll(".radio-option").forEach(function(el) {
    el.classList.toggle("selected", el.querySelector("input").value === val);
  });
}

// ===================================
// Checkbox（Q4 同住狀況，含互斥邏輯）
// ===================================
const EXCLUSIVE_LIVING = ["獨居", "住宿舍（學校或公司）", "其他（不屬於以上任一狀況）"];
let selectedLivingWith = [];

function toggleLivingWith(el, val) {
  const group = document.getElementById("livingWithGroup");
  const isExclusive = EXCLUSIVE_LIVING.includes(val);
  const wasSelected = el.classList.contains("selected");

  if (wasSelected) {
    // 取消勾選
    el.classList.remove("selected");
  } else {
    if (isExclusive) {
      // 互斥選項：取消所有其他
      group.querySelectorAll(".checkbox-option").forEach(function(opt) {
        opt.classList.remove("selected");
      });
      el.classList.add("selected");
    } else {
      // 一般選項：取消互斥選項
      group.querySelectorAll(".checkbox-option").forEach(function(opt) {
        const label = opt.querySelector(".checkbox-label").textContent.trim();
        if (EXCLUSIVE_LIVING.includes(label)) opt.classList.remove("selected");
      });
      el.classList.add("selected");
    }
  }

  // 重建陣列
  selectedLivingWith = [];
  group.querySelectorAll(".checkbox-option.selected").forEach(function(opt) {
    selectedLivingWith.push(opt.querySelector(".checkbox-label").textContent.trim());
  });
}
const FLEXIBLE_LABEL = "排班不固定，需視情況而定";
function toggleAvailableTime(el, val) {
  const isFlexible = val === FLEXIBLE_LABEL;
  const group = document.getElementById("availableTimeGroup");

  if (isFlexible) {
    // 勾選「排班不固定」→ 取消其他所有選項
    group.querySelectorAll(".checkbox-option").forEach(function(opt) {
      opt.classList.remove("selected");
    });
    el.classList.add("selected");
    selectedAvailableTime = [FLEXIBLE_LABEL];
  } else {
    // 勾選特定時段 → 取消「排班不固定」
    const flexEl = document.getElementById("optFlexible");
    if (flexEl) flexEl.classList.remove("selected");
    el.classList.toggle("selected");
    // 重建陣列（排除排班不固定）
    selectedAvailableTime = [];
    group.querySelectorAll(".checkbox-option.selected").forEach(function(opt) {
      const label = opt.querySelector(".checkbox-label").textContent.trim();
      if (label !== FLEXIBLE_LABEL) selectedAvailableTime.push(label);
    });
  }
}

// ===================================
// 送出
// ===================================
async function submitNewPatient() {
  if (isSubmitting) return;
  if (!radioState.referral) return showError("請選擇如何得知悅心診所");
  if (!radioState.isAdult) return showError("請選擇是否已成年");
  if (!radioState.residence) return showError("請選擇目前居住地");
  if (selectedLivingWith.length === 0) return showError("請至少選擇一個同住狀況");
  if (!radioState.occupation) return showError("請選擇您的職業與作息型態");
  if (selectedAvailableTime.length === 0) return showError("請至少選擇一個方便的回診時段");

  isSubmitting = true;
  const btn = document.getElementById("btnSubmitNew");
  btn.disabled = true; btn.textContent = "送出中...";

  try {
    const payload = {
      action: "submitNewPatient",
      bookingId: bookingId,
      name: name,
      lineId: lineId,
      apptDate: apptDate,
      referral: radioState.referral,
      isAdult: radioState.isAdult,
      residence: radioState.residence,
      livingWith: selectedLivingWith.join("；"),
      occupation: radioState.occupation,
      availableTime: selectedAvailableTime.join("；")
    };
    const data = await xhrPost(API_URL, payload);
    if (!data.success) throw new Error(data.error);
    showSuccess();
  } catch(e) {
    showError("送出失敗，請重試");
  } finally {
    isSubmitting = false;
    btn.disabled = false; btn.textContent = "送出資料";
  }
}

function skipNewPatient() { showSuccess(); }

function showSuccess() {
  document.getElementById("pageForm").classList.remove("active");
  document.getElementById("pageSuccess").classList.add("active");
  window.scrollTo(0, 0);
}

function showError(msg) {
  const el = document.getElementById("errorForm");
  el.textContent = msg; el.style.display = "block";
  el.scrollIntoView({ behavior: "smooth", block: "center" });
}

function xhrGet(url) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);
    xhr.onload = function() {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch(e) { reject(e); }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.send();
  });
}

function xhrPost(url, payload) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open("POST", url, true);
    xhr.setRequestHeader("Content-Type", "text/plain");
    xhr.onload = function() {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch(e) { reject(e); }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.send(JSON.stringify(payload));
  });
}

function goToEntry() {
  window.location.href = "booking.html";
}

function closeLiff() {
  if (typeof liff !== "undefined" && liff.isInClient()) {
    liff.closeWindow();
  } else {
    window.close();
  }
}
