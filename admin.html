<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>悅心診所 Admin Portal</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  /* ════════════════════════
     CSS 變數 — Metro 色系
  ════════════════════════ */
  :root {
    --orange:       #E8620A;
    --orange-dark:  #BF4E07;
    --orange-light: #FFF0E8;
    --purple:       #6A00FF;
    --green-metro:  #60A917;
    --teal:         #00ABA9;
    --red-metro:    #E51400;
    --bg:           #FFFFFF;
    --white:        #FFFFFF;
    --text:         #1A1A1A;
    --text-light:   #666666;
    --border:       #E0E0E0;
    --empty-bg:     #F4F4F4;
    --empty-text:   #CCCCCC;
    --error:        #E51400;
    --success:      #60A917;
    --green-light:  #EEF4E8;
  }

  /* ── 全域重置 ── */
  * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); }

  /* ── Auth ── */
  #pageAuth { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; background: var(--orange); }
  .auth-card { background: var(--white); padding: 40px 32px; text-align: center; max-width: 320px; width: 100%; }
  .auth-icon { font-size: 48px; margin-bottom: 16px; }
  .auth-title { font-size: 20px; font-weight: 700; color: var(--orange); margin-bottom: 8px; letter-spacing: 2px; }
  .auth-sub { font-size: 13px; color: var(--text-light); line-height: 1.6; }

  /* ── Main ── */
  #pageMain { display: none; height: 100vh; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  .header { background: var(--orange); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-left h1 { font-size: 18px; font-weight: 700; color: var(--white); letter-spacing: 3px; }
  .header-left p { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 1px; }
  .header-badge { background: rgba(255,255,255,0.2); color: var(--white); padding: 4px 12px; font-size: 12px; font-weight: 500; }

  /* ── 手機版欄位順序 ── */
  .col-left { order: 2; }
  .col-center { order: 1; }
  .col-right { order: 3; }
  .desktop-body { display: flex; flex-direction: column; }

  /* ── Section Title ── */
  .section-title { font-size: 11px; font-weight: 700; color: var(--text-light); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; letter-spacing: 1px; text-transform: uppercase; }
  .section-title::before { content: ''; width: 4px; height: 14px; background: var(--orange); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 3px; margin-bottom: 6px; }
  .tab-btn { flex: 1; padding: 8px 4px; border: none; font-size: 12px; font-family: 'Noto Sans TC', sans-serif; background: var(--empty-bg); color: var(--text-light); cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .tab-btn:active { transform: scale(0.96); }
  .tab-btn.active { background: var(--orange); color: var(--white); font-weight: 700; }

  /* ── Session Info Row ── */
  .session-info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: var(--empty-bg); margin-bottom: 6px; border-left: 4px solid var(--orange); }
  .session-doctor { font-size: 15px; font-weight: 700; color: var(--text); }
  .session-counts { display: flex; gap: 4px; }
  .count-badge { padding: 2px 7px; font-size: 12px; font-weight: 700; }
  .count-new { background: var(--orange); color: var(--white); }
  .count-rt { background: var(--green-metro); color: var(--white); }
  .count-un { background: #888; color: var(--white); }

  /* ── Panel Header ── */
  .panel-header { flex-shrink: 0; padding: 8px 10px 4px; background: var(--bg); }

  /* ── Panel Schedule ── */
  .panel-schedule { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 0 10px 4px; overflow: hidden; }
  .schedule-scroll { flex: 1; overflow-y: auto; min-height: 0; }

  /* ════════════════════════
     30格 Metro 動態磚
  ════════════════════════ */
  .grid-30 { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 4px; padding: 2px 0 6px; }

  .grid-cell {
    position: relative;
    background: var(--empty-bg);
    border: none;
    padding: 6px 6px 4px;
    display: flex;
    flex-direction: column;
    min-height: 56px;
    aspect-ratio: 1 / 1;
    cursor: default;
    transition: transform 0.1s;
    overflow: hidden;
  }
  .grid-cell:active { transform: scale(0.96); }

  /* 有病患：高飽和橘 */
  .grid-cell.has-patient { background: var(--orange); cursor: default; }
  /* 代掛未通知：深紫 */
  .grid-cell.admin-pending { background: var(--purple); cursor: pointer; }
  /* 代掛已通知：草綠 */
  .grid-cell.admin-notified { background: var(--green-metro); cursor: pointer; }
  /* 空號：極淡灰 */
  .grid-cell.empty { background: var(--empty-bg); }

  /* 號碼：左上角大字 */
  .cell-num {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    align-self: flex-start;
  }
  .grid-cell.has-patient .cell-num { color: var(--white); }
  .grid-cell.admin-pending .cell-num { color: var(--white); }
  .grid-cell.admin-notified .cell-num { color: var(--white); }
  .grid-cell.empty .cell-num { color: var(--empty-text); }

  /* 姓名：左下角小字 */
  .cell-name {
    font-size: 11px;
    font-weight: 700;
    position: absolute;
    bottom: 5px;
    left: 6px;
    right: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.2;
  }
  .grid-cell.has-patient .cell-name { color: rgba(255,255,255,0.9); }
  .grid-cell.admin-pending .cell-name { color: rgba(255,255,255,0.9); }
  .grid-cell.admin-notified .cell-name { color: rgba(255,255,255,0.9); }
  .grid-cell.empty .cell-name { color: transparent; }

  /* ── 初診橫幅 ── */
  .grid-np-banner {
    grid-column: 1 / -1;
    border: none;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 56px;
    transition: transform 0.1s;
  }
  .grid-np-banner:active { transform: scale(0.99); }
  .grid-np-banner.has-patient { background: var(--orange); }
  .grid-np-banner.has-patient .np-banner-time { color: rgba(255,255,255,0.8); }
  .grid-np-banner.has-patient .np-banner-name { color: var(--white); }
  .grid-np-banner.admin-pending { background: var(--purple); cursor: pointer; }
  .grid-np-banner.admin-pending .np-banner-time { color: rgba(255,255,255,0.8); }
  .grid-np-banner.admin-pending .np-banner-name { color: var(--white); }
  .grid-np-banner.admin-notified { background: var(--green-metro); cursor: pointer; }
  .grid-np-banner.admin-notified .np-banner-time { color: rgba(255,255,255,0.8); }
  .grid-np-banner.admin-notified .np-banner-name { color: var(--white); }
  .np-banner-time { font-size: 12px; flex-shrink: 0; font-weight: 500; }
  .np-banner-name { flex: 1; font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── 報到按鈕 ── */
  .checkin-mini {
    flex-shrink: 0;
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: transform 0.1s;
    white-space: nowrap;
  }
  .checkin-mini:active { transform: scale(0.96); }
  .checkin-mini.pending { background: rgba(255,255,255,0.25); color: var(--white); }
  .checkin-mini.pending:hover { background: rgba(255,255,255,0.4); }
  .checkin-mini.done { background: rgba(0,0,0,0.2); color: var(--white); }
  .checkin-mini.done:hover { background: rgba(229,20,0,0.7); }

  /* ── 不指定按鈕 ── */
  .unspec-btn {
    width: 100%;
    margin-top: 4px;
    padding: 12px;
    background: var(--empty-bg);
    border: 2px dashed var(--border);
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    flex-shrink: 0;
  }
  .unspec-btn:hover { background: var(--orange); color: var(--white); border-color: var(--orange); }
  .unspec-btn:active { transform: scale(0.98); }

  /* ── 心理治療區 ── */
  .panel-therapy { flex-shrink: 0; min-height: 72px; padding: 6px 10px; border-top: 3px solid var(--empty-bg); }
  .therapy-card { background: var(--empty-bg); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; border-left: 4px solid var(--purple); }
  .therapy-title { font-size: 15px; font-weight: 700; color: var(--purple); }
  .therapy-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .therapy-badge { background: var(--purple); color: var(--white); padding: 4px 12px; font-size: 10px; font-weight: 700; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }

  /* ── 櫃台功能區 ── */
  .panel-tools { flex-shrink: 0; padding: 6px 10px 10px; border-top: 3px solid var(--empty-bg); }
  .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .tool-card {
    padding: 14px 12px;
    border: none;
    cursor: pointer;
    transition: transform 0.1s;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    min-height: 64px;
  }
  .tool-card:active { transform: scale(0.96); }
  /* 四個工具各有不同 Metro 色 */
  .tool-card:nth-child(1) { background: var(--orange); }
  .tool-card:nth-child(2) { background: var(--teal); }
  .tool-card:nth-child(3) { background: #E3008C; }
  .tool-card:nth-child(4) { background: #1D1D1D; }
  .tool-icon { font-size: 24px; flex-shrink: 0; }
  .tool-name { font-size: 15px; font-weight: 700; color: var(--white); }
  .tool-desc { font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1.3; margin-top: 1px; }

  /* ── 日期導覽列 ── */
  .date-nav { display: flex; align-items: center; gap: 3px; margin-bottom: 6px; }
  .date-nav-btn {
    flex-shrink: 0;
    padding: 8px 12px;
    border: none;
    background: var(--empty-bg);
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
    line-height: 1;
  }
  .date-nav-btn:hover { background: var(--orange); color: var(--white); }
  .date-nav-btn:active { transform: scale(0.96); }
  .date-nav-btn.today { font-size: 13px; padding: 8px 10px; color: var(--text-light); background: var(--empty-bg); }
  .date-nav-btn.today:hover { background: var(--orange); color: var(--white); }
  .date-nav-center { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: var(--empty-bg); padding: 8px 4px; }
  .date-nav-label { font-size: 15px; font-weight: 700; color: var(--text); pointer-events: none; white-space: nowrap; }
  .date-nav-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; border: none; background: transparent; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--white); padding: 24px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--orange); padding-left: 10px; }
  .modal-close { margin-left: auto; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-light); padding: 0 4px; }

  /* ── Form ── */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; color: var(--text-light); margin-bottom: 5px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 10px 12px; border: 2px solid var(--border); font-size: 14px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); background: var(--white); transition: border-color 0.15s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--orange); }
  textarea { resize: vertical; min-height: 70px; }
  .date-row { display: flex; gap: 8px; }
  .date-row .form-group { flex: 1; }

  .btn { width: 100%; padding: 13px; border: none; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; font-weight: 700; cursor: pointer; transition: transform 0.1s; letter-spacing: 1px; margin-bottom: 8px; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--orange); color: var(--white); }
  .btn-primary:hover { background: var(--orange-dark); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-outline { background: var(--white); color: var(--orange); border: 2px solid var(--orange); }
  .btn-danger { background: var(--white); color: var(--error); border: 2px solid var(--error); }
  .btn-danger:hover { background: var(--error); color: var(--white); }
  .btn-sm { width: auto; padding: 7px 14px; font-size: 12px; margin-bottom: 0; }

  .alert { padding: 10px 12px; font-size: 13px; margin-bottom: 10px; line-height: 1.6; border-left: 4px solid; }
  .alert-error { background: #FFF0EE; color: var(--error); border-color: var(--error); }
  .alert-success { background: #F0F8EE; color: var(--success); border-color: var(--success); }
  .alert-info { background: var(--orange-light); color: var(--orange-dark); border-color: var(--orange); }

  .result-item { padding: 12px; border-left: 4px solid var(--border); margin-bottom: 8px; background: var(--empty-bg); }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .result-date { font-size: 13px; font-weight: 700; }
  .result-status { font-size: 11px; padding: 2px 7px; background: var(--green-metro); color: var(--white); font-weight: 700; }
  .result-detail { font-size: 12px; color: var(--text-light); line-height: 1.8; }

  .log-item { padding: 9px 11px; border-left: 4px solid var(--error); background: #FFF0EE; margin-bottom: 7px; font-size: 12px; line-height: 1.6; }
  .log-time { color: var(--text-light); font-size: 10px; }
  .log-event { color: var(--error); font-weight: 700; }
  .divider { height: 2px; background: var(--empty-bg); margin: 12px 0; }
  .preview-count { background: var(--orange-light); color: var(--orange); padding: 9px 12px; font-size: 13px; font-weight: 700; margin-bottom: 10px; text-align: center; border-left: 4px solid var(--orange); }

  .loading { text-align: center; padding: 20px; color: var(--text-light); font-size: 13px; }
  .loading-bar-wrap { width: 100%; height: 4px; background: var(--empty-bg); margin: 10px 0 4px; overflow: hidden; }
  .loading-bar { height: 100%; width: 40%; background: var(--orange); animation: loadingSlide 1.2s ease-in-out infinite; }
  @keyframes loadingSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }
  .empty-state { text-align: center; padding: 20px; color: var(--text-light); font-size: 13px; }

  /* ── 異常排班區塊 ── */
  .conflict-zone { margin-top: 6px; border-left: 4px solid var(--error); padding: 8px 10px; background: #FFF0EE; flex-shrink: 0; }
  .conflict-title { font-size: 12px; font-weight: 700; color: var(--error); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
  .conflict-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #FFCCCC; font-size: 12px; }
  .conflict-row:last-child { border-bottom: none; }
  .conflict-slot { font-weight: 700; color: var(--error); min-width: 32px; }
  .conflict-name { font-weight: 500; flex: 1; }
  .conflict-note { font-size: 10px; color: var(--text-light); }

  /* ── 聯絡小卡 Modal ── */
  .contact-name { font-size: 24px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 8px; }
  .contact-phone { display: block; font-size: 32px; font-weight: 700; color: var(--orange); text-align: center; text-decoration: none; letter-spacing: 3px; margin-bottom: 20px; }
  .btn-notified-pending { background: var(--purple); color: var(--white); }
  .btn-notified-pending:hover { background: #5500CC; }
  .btn-notified-done { background: var(--green-metro); color: var(--white); }
  .btn-notified-done:hover { background: var(--error); }

  /* ── 不指定 Modal 列表 ── */
  .unspec-modal-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .unspec-modal-row:last-child { border-bottom: none; }
  .unspec-modal-num { font-size: 11px; color: var(--text-light); width: 18px; text-align: center; flex-shrink: 0; }
  .unspec-modal-name { font-weight: 700; flex: 1; }

  /* ════════════════════════════════════════════════
     響應式佈局 — 平板／電腦（768px 以上）
  ════════════════════════════════════════════════ */
  @media (min-width: 768px) {
    body { background: #F0F0F0; }
    #pageMain { height: 100vh; overflow: hidden; }

    .header { padding: 16px 28px; }
    .header-left h1 { font-size: 24px; letter-spacing: 4px; }
    .header-left p { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 6px 18px; }

    .desktop-body {
      display: grid;
      grid-template-columns: 2fr 6fr 2fr;
      grid-template-rows: 1fr;
      gap: 0;
      flex: 1;
      min-height: 0;
      height: calc(100vh - 61px);
      overflow: hidden;
    }

    .col-left { background: #F8F8F8; border-right: 3px solid var(--empty-bg); display: flex; flex-direction: column; overflow-y: auto; padding: 16px 12px; order: 1; }
    .col-center { display: flex; flex-direction: column; overflow: hidden; background: var(--white); order: 2; }
    .col-right { background: #F8F8F8; border-left: 3px solid var(--empty-bg); display: flex; flex-direction: column; overflow-y: auto; padding: 16px 12px; order: 3; }

    .col-center .panel-schedule { flex: 1; min-height: 0; padding: 12px 16px 8px; }
    .col-left .panel-therapy { border-top: none; padding: 0; }
    .col-right .panel-tools { border-top: none; padding: 0; }

    /* 右欄工具 1×4 直排 */
    .col-right .tools-grid { grid-template-columns: 1fr; gap: 4px; }
    .col-right .tool-card { padding: 18px 16px; min-height: 72px; }
    .col-right .tool-name { font-size: 16px; }
    .col-right .tool-desc { font-size: 12px; }
    .col-right .tool-icon { font-size: 28px; }

    /* 30格放大，桌面版取消 aspect-ratio 改用固定高度 */
    .grid-cell { min-height: 80px; aspect-ratio: unset; }
    .grid-np-banner { min-height: 80px; padding: 10px 16px; }
    .cell-num { font-size: 28px; }
    .cell-name { font-size: 12px; bottom: 6px; left: 8px; }
    .np-banner-time { font-size: 14px; }
    .np-banner-name { font-size: 18px; }
    .checkin-mini { font-size: 14px; padding: 8px 16px; }

    .date-nav-label { font-size: 18px; }
    .date-nav-btn { font-size: 18px; padding: 10px 16px; }
    .date-nav-btn.today { font-size: 14px; }
    .tab-btn { font-size: 14px; padding: 10px 6px; }
    .session-doctor { font-size: 18px; }
    .count-badge { font-size: 13px; padding: 4px 10px; }
    .unspec-btn { font-size: 16px; padding: 16px; }
    .section-title { font-size: 12px; margin-bottom: 12px; }
    .therapy-title { font-size: 16px; }
    .therapy-sub { font-size: 13px; }

    .modal { max-width: 560px; padding: 32px; }
    .modal-title { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- Auth -->
<div id="pageAuth">
  <div class="auth-card">
    <div class="auth-icon">🚪</div>
    <div class="auth-title">悅心診所線上服務</div>
    <div class="auth-sub">請稍候...</div>
  </div>
</div>

<!-- Main -->
<div id="pageMain">

  <!-- Header -->
  <div class="header">
    <div class="header-left"><h1>悅心診所</h1><p>Admin Portal</p></div>
    <div class="header-badge" id="adminBadge">載入中...</div>
  </div>

  <!-- desktop-body: 三欄容器 -->
  <div class="desktop-body">

    <!-- 左欄：心理治療時間軸 -->
    <div class="col-left">
      <!-- ③ 心理治療區 -->
      <div class="panel-therapy">
        <div class="section-title">🧠 心理治療</div>
        <div class="therapy-card">
          <div>
            <div class="therapy-title">🧠 心理治療</div>
            <div class="therapy-sub">目前尚無排程資料</div>
          </div>
          <div class="therapy-badge">建置中...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz1IB0HCFWaFlC7odExNsOWaZwTjz7osAjstXhx_5V0ZD4Ya58GGRRPfFAun2Itywbh6A/exec";
let state = { lineId: "", adminName: "", pendingCancelId: "", bcPreviewCount: 0, viewDate: new Date(), contactBookingId: "", contactIsNotified: false };
let allBookings = [], activeSession = "";

function dateToYMD(d) {
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
}
function dateToDisplay(d) {
  const weekdays = ["日","一","二","三","四","五","六"];
  return d.getFullYear() + "/" + String(d.getMonth()+1).padStart(2,"0") + "/" + String(d.getDate()).padStart(2,"0") + " (" + weekdays[d.getDay()] + ") 📅";
}
function updateDateNav() {
  document.getElementById("dateNavLabel").textContent = dateToDisplay(state.viewDate);
  const ymd = dateToYMD(state.viewDate);
  document.getElementById("dateNavInput").value = ymd.substring(0,4) + "-" + ymd.substring(4,6) + "-" + ymd.substring(6,8);
}
function changeDate(offset) {
  const d = new Date(state.viewDate);
  d.setDate(d.getDate() + offset);
  state.viewDate = d;
  updateDateNav();
  loadSchedule();
}
function goToToday() {
  state.viewDate = new Date();
  updateDateNav();
  loadSchedule();
}
function onDatePick(e) {
  const parts = e.target.value.split("-");
  if (parts.length !== 3) return;
  state.viewDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  updateDateNav();
  loadSchedule();
}

async function initLiff() {
  try {
    await liff.init({ liffId: "2009340533-qmLOBHw1" });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    state.lineId = profile.userId;
    const verify = await xhrGet(`${API_URL}?action=verifyAdmin&lineId=${state.lineId}`);
    if (!verify.success) {
      document.getElementById("pageAuth").innerHTML = `<div class="auth-card"><div class="auth-icon">🔒</div><div class="auth-title">頁面錯誤</div></div>`;
      return;
    }
    state.adminName = verify.name;
    document.getElementById("adminBadge").textContent = "👤 " + state.adminName;
    document.getElementById("pageAuth").style.display = "none";
    document.getElementById("pageMain").style.display = "flex";
    updateDateNav();
    loadSchedule();
  } catch(e) {
    document.getElementById("pageAuth").innerHTML = `<div class="auth-card"><div class="auth-icon">⚠️</div><div class="auth-title">暫時無法連線</div><div class="auth-sub">請重新整理頁面。</div></div>`;
  }
}

var XHR_TIMEOUT = 15000; // 15秒

function xhrParseResponse(text) {
  if (typeof text === "string" && text.trimStart().charAt(0) === "<") {
    throw new Error("SERVER_HTML"); // GAS 回傳 HTML 錯誤頁
  }
  return JSON.parse(text);
}

function xhrGet(url) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);
    xhr.timeout = XHR_TIMEOUT;
    xhr.onload = function() {
      try { resolve(xhrParseResponse(xhr.responseText)); }
      catch(e) { reject(e); }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.ontimeout = function() { reject(new Error("Timeout")); };
    xhr.send();
  });
}

function xhrPost(url, payload) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open("POST", url, true);
    xhr.setRequestHeader("Content-Type", "text/plain");
    xhr.timeout = XHR_TIMEOUT;
    xhr.onload = function() {
      try { resolve(xhrParseResponse(xhr.responseText)); }
      catch(e) { reject(e); }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.ontimeout = function() { reject(new Error("Timeout")); };
    xhr.send(JSON.stringify(payload));
  });
}
function getTodayStr() { const n = new Date(); return n.getFullYear() + "/" + String(n.getMonth()+1).padStart(2,"0") + "/" + String(n.getDate()).padStart(2,"0"); }
function esc(str) { return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function loadSchedule() {
  document.getElementById("scheduleContent").innerHTML = `<div class="loading"><div class="loading-bar-wrap"><div class="loading-bar"></div></div>載入診表中...</div>`;
  document.getElementById("sessionTabs").innerHTML = "";
  document.getElementById("sessionInfoRow").style.display = "none";
  try {
    const data = await xhrGet(`${API_URL}?action=adminGetTodaySchedule&date=${dateToYMD(state.viewDate)}&lineId=${state.lineId}`);
    renderSchedule(data.bookings || []);
  } catch(e) {
    document.getElementById("scheduleContent").innerHTML = `<div class="alert alert-error">診表暫時無法載入，請重新整理頁面。</div>`;
  }
}

function renderSchedule(bookings) {
  allBookings = bookings;
  const tabEl = document.getElementById("sessionTabs");
  const el = document.getElementById("scheduleContent");
  if (bookings.length === 0) {
    tabEl.innerHTML = "";
    document.getElementById("sessionInfoRow").style.display = "none";
    el.innerHTML = `<div class="empty-state">📋 今日無預約</div>`;
    return;
  }
  const sn = {"早上":"早上診","下午":"下午診","晚上":"晚上診"};
  const available = ["早上","下午","晚上"].filter(s => bookings.some(b => b.session === s));
  tabEl.innerHTML = available.map(function(s) {
    return `<button class="tab-btn" id="tab-${s}" onclick="switchTab('${s}')">${sn[s]} ${bookings.filter(b=>b.session===s).length}</button>`;
  }).join("");
  activeSession = available[0];
  renderSessionContent(activeSession);
  document.getElementById("tab-" + activeSession).classList.add("active");
}

function switchTab(session) {
  activeSession = session;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + session).classList.add("active");
  renderSessionContent(session);
}

/* ════════════════════════════════════════════════
   核心渲染：30 格儀表板
   ════════════════════════════════════════════════ */
function renderSessionContent(session) {
  const el = document.getElementById("scheduleContent");
  const list = allBookings.filter(b => b.session === session);
  const npList = list.filter(b => b.type === "初診")
    .slice().sort(function(a, b) {
      return String(a.checkInTime || "").localeCompare(String(b.checkInTime || ""));
    });
  const rtList = list.filter(b => b.type !== "初診" && b.slot !== "不指定");
  const unList = list.filter(b => b.type !== "初診" && b.slot === "不指定");
  const doctor = list.length > 0 ? list[0].doctor : "";

  // 資訊列
  const infoRow = document.getElementById("sessionInfoRow");
  infoRow.style.display = list.length > 0 ? "flex" : "none";
  const isSubstitute = list.length > 0 && list[0].isSubstitute;
  const doctorLabel = doctor ? (isSubstitute ? "👨‍⚕️ *代診 " + doctor + " 醫師" : "👨‍⚕️ " + doctor + " 醫師") : "";
  document.getElementById("sessionDoctorText").textContent = doctorLabel;
  document.getElementById("sessionCountBadges").innerHTML =
    `<span class="count-badge count-new">初診 ${npList.length}</span>` +
    `<span class="count-badge count-rt">複診 ${rtList.length}</span>` +
    (unList.length > 0 ? `<span class="count-badge count-un">不指定 ${unList.length}</span>` : "");

  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state">📋 此時段無預約</div>`;
    return;
  }

  /*
    格子配置邏輯：
    - 1-5 號（index 0-4）：固定小格，永不被初診佔用
    - 從第 6 格（index 5）起，每 5 格為一列
      第 1 位初診佔 index 5-9（6-10 號位置）
      第 2 位初診佔 index 10-14（11-15 號位置）
      依此類推，最多 5 位初診佔用 6-30 號
    - 每位複診依 slot 塞入對應 index（slot-1）
    - 若某列被初診佔用，該列的複診改插入剩餘空格
  */

  // 建立 30 格陣列，預設為空
  // 每格格式：{ type: 'empty' | 'rt' | 'np_banner', ...data }
  const cells = [];
  for (let i = 0; i < 30; i++) cells.push({ type: "empty", num: i + 1 });

  // 初診佔用的列集合（index of row start: 5,10,15,20,25）
  const npRowStarts = new Set();
  npList.forEach(function(np, idx) {
    const rowStart = 5 + idx * 5; // 5, 10, 15, 20, 25
    if (rowStart < 30) npRowStarts.add(rowStart);
  });

  // 塞入複診（slot 決定位置）
  // 若與初診格位衝突，收入 conflictList 而非直接隱藏
  const conflictList = [];
  rtList.forEach(function(b) {
    const slot = parseInt(b.slot, 10);
    if (slot >= 1 && slot <= 30) {
      const idx = slot - 1;
      const rowStart = idx < 5 ? null : Math.floor((idx - 5) / 5) * 5 + 5;
      if (rowStart !== null && npRowStarts.has(rowStart)) {
        // 格位與初診橫幅衝突 → 收入異常清單，不隱藏
        conflictList.push(b);
        return;
      }
      cells[idx] = { type: "rt", num: slot, name: b.name, bookingId: b.bookingId, status: b.status, phone: b.phone || "", isAdminBooking: b.isAdminBooking || false, note: b.note || "" };
    }
  });

  // 將初診填回對應 rowStart 格（標記為 banner，渲染時輸出 grid-column: 1/-1）
  npList.forEach(function(np, idx) {
    const rowStart = 5 + idx * 5;
    if (rowStart < 30) {
      cells[rowStart] = {
        type: "np_banner",
        checkInTime: np.checkInTime,
        name: np.name,
        bookingId: np.bookingId,
        status: np.status,
        phone: np.phone || "",
        isAdminBooking: np.isAdminBooking || false,
        note: np.note || ""
      };
      // 把 rowStart+1 ~ rowStart+4 標記為 np_skip（渲染時略過）
      for (let k = 1; k < 5; k++) {
        if (rowStart + k < 30) cells[rowStart + k] = { type: "np_skip" };
      }
    }
  });

  // 渲染 HTML
  let html = `<div class="grid-30">`;

  for (let i = 0; i < 30; i++) {
    const c = cells[i];
    if (c.type === "np_skip") continue; // 已被 grid-column: 1/-1 佔用，不輸出

    if (c.type === "np_banner") {
      const isDone = c.status === "已看診";
      const isNotified = c.isAdminBooking && c.note.indexOf("[已通知]") !== -1;
      const bannerClass = c.isAdminBooking ? (isNotified ? "admin-notified" : "admin-pending") : "has-patient";
      const clickAttr = c.isAdminBooking ? `data-bid="${esc(c.bookingId)}" data-name="${esc(c.name)}" data-phone="${esc(c.phone)}" data-notified="${isNotified}" onclick="openContactModalFromEl(this)"` : "";
      const checkMark = c.isAdminBooking && isNotified ? "✓ " : "";
      html += `<div class="grid-np-banner ${bannerClass}" ${clickAttr}>
        <span class="np-banner-time">${checkMark}${esc(c.checkInTime)}前</span>
        <span class="np-banner-name">初診・${esc(c.name)}</span>
        <button class="checkin-mini ${isDone?'done':'pending'}" id="btn-${esc(c.bookingId)}"
          onclick="event.stopPropagation(); toggleCheckin('${esc(c.bookingId)}',this)">${isDone?'✓ 已看診':'未看診'}</button>
      </div>`;
    } else if (c.type === "rt") {
      const isNotified = c.isAdminBooking && c.note.indexOf("[已通知]") !== -1;
      const cellClass = c.isAdminBooking ? (isNotified ? "admin-notified" : "admin-pending") : "has-patient";
      const numDisplay = c.isAdminBooking && isNotified ? `${c.num} ✓` : `${c.num}`;
      const clickAttr = c.isAdminBooking ? `data-bid="${esc(c.bookingId)}" data-name="${esc(c.name)}" data-phone="${esc(c.phone)}" data-notified="${isNotified}" onclick="openContactModalFromEl(this)"` : "";
      html += `<div class="grid-cell ${cellClass}" ${clickAttr}>
        <span class="cell-num">${numDisplay}</span>
        <span class="cell-name" title="${esc(c.name)}">${esc(c.name)}</span>
      </div>`;
    } else {
      // empty
      html += `<div class="grid-cell empty">
        <span class="cell-num">${c.num}</span>
        <span class="cell-name">　</span>
      </div>`;
    }
  }

  html += `</div>`; // end grid-30

  // 不指定按鈕（全寬，grid 下方）
  if (unList.length > 0) {
    html += `<button class="unspec-btn" onclick="openUnspecModal()">📋 查看不指定名單（${unList.length} 人）</button>`;
  }

  // 異常排班區（格位衝突，絕對不能隱藏）
  if (conflictList.length > 0) {
    html += `<div class="conflict-zone">
      <div class="conflict-title">⚠️ 異常排班（${conflictList.length} 人）—— 號碼與初診格位衝突，請人工確認</div>`;
    conflictList.forEach(function(b) {
      html += `<div class="conflict-row">
        <span class="conflict-slot">${esc(b.slot)}號</span>
        <span class="conflict-name">${esc(b.name)}</span>
        <span class="conflict-note">格位重疊</span>
      </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}

/* ── 不指定 Modal ── */
function openUnspecModal() {
  const list = allBookings.filter(b => b.session === activeSession && b.type !== "初診" && b.slot === "不指定");
  const el = document.getElementById("unspecContent");
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state">目前無不指定病患</div>`;
  } else {
    el.innerHTML = list.map(function(b, i) {
      return `<div class="unspec-modal-row">
        <span class="unspec-modal-num">${i + 1}</span>
        <span class="unspec-modal-name">${esc(b.name)}</span>
      </div>`;
    }).join("");
  }
  openModal("modalUnspecified");
}

/* ── 聯絡小卡 Modal ── */
function openContactModalFromEl(el) {
  const bookingId = el.dataset.bid;
  const name = el.dataset.name;
  const phone = el.dataset.phone;
  const isNotified = el.dataset.notified === "true";
  openContactModal(bookingId, name, phone, isNotified);
}

function openContactModal(bookingId, name, phone, isNotified) {
  state.contactBookingId = bookingId;
  state.contactIsNotified = (isNotified === true || isNotified === "true");
  const notified = state.contactIsNotified;
  document.getElementById("contactName").textContent = name;
  document.getElementById("contactPhone").textContent = phone;
  document.getElementById("contactPhone").href = "tel:" + phone;
  const btn = document.getElementById("btnToggleNotified");
  if (notified) {
    btn.textContent = "✓ 已通知";
    btn.className = "btn btn-notified-done";
  } else {
    btn.textContent = "未通知";
    btn.className = "btn btn-notified-pending";
  }
  btn.disabled = false;
  document.getElementById("contactError").style.display = "none";
  document.getElementById("modalContact").classList.add("active");
}

async function doToggleNotified() {
  const btn = document.getElementById("btnToggleNotified");
  const newIsNotified = !state.contactIsNotified;
  btn.disabled = true; btn.textContent = "更新中...";
  try {
    const data = await xhrPost(API_URL, { action: "toggleNotified", bookingId: state.contactBookingId, isNotified: newIsNotified, lineId: state.lineId });
    if (data.success) {
      closeModal("modalContact");
      loadSchedule();
    } else {
      btn.disabled = false;
      btn.textContent = state.contactIsNotified ? "✓ 已通知" : "未通知";
      alert("狀態更新未完成，請稍後再試。");
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = state.contactIsNotified ? "✓ 已通知" : "未通知";
    alert("狀態更新未完成，請稍後再試。");
  }
}

/* ── 報到切換 ── */
async function toggleCheckin(bookingId, btn) {
  const isDone = btn.classList.contains("done");
  const newStatus = isDone ? "已確認" : "已看診";
  btn.disabled = true; btn.textContent = "更新中...";
  try {
    const data = await xhrPost(API_URL, { action: "adminUpdateStatus", bookingId, status: newStatus, lineId: state.lineId });
    if (data.success) {
      if (newStatus === "已看診") { btn.classList.remove("pending"); btn.classList.add("done"); btn.textContent = "✓ 已看診"; }
      else { btn.classList.remove("done"); btn.classList.add("pending"); btn.textContent = "未看診"; }
    } else { btn.textContent = isDone ? "✓ 已看診" : "未看診"; }
  } catch(e) {
    btn.textContent = isDone ? "✓ 已看診" : "未看診";
    const errTip = document.createElement("span");
    errTip.textContent = " ⚠️ 更新失敗";
    errTip.style.cssText = "font-size:11px;color:var(--error);margin-left:4px;";
    btn.parentNode.appendChild(errTip);
    setTimeout(function() { if (errTip.parentNode) errTip.parentNode.removeChild(errTip); }, 4000);
  }
  btn.disabled = false;
}

/* ── Modal 開關 ── */
function openModal(id) {
  // 開啟前清空所有錯誤提示與輸入殘留
  document.querySelectorAll("#" + id + " .alert-error, #" + id + " .alert-success").forEach(function(el) {
    el.style.display = "none"; el.textContent = "";
  });
  document.querySelectorAll("#" + id + " input[type='text'], #" + id + " input[type='date'], #" + id + " textarea").forEach(function(el) {
    el.value = "";
  });
  document.querySelectorAll("#" + id + " select").forEach(function(el) {
    el.selectedIndex = 0;
  });
  document.getElementById(id).classList.add("active");
  if (id === "modalSecurity") loadSecurity();
  if (id === "modalSubstitute") loadSubstituteList();
}
function closeModal(id) { document.getElementById(id).classList.remove("active"); }

/* ── 代診排班 ── */
async function loadSubstituteList() {
  const el = document.getElementById("subList");
  try {
    const data = await xhrGet(`${API_URL}?action=getSubstituteList&lineId=${state.lineId}`);
    const list = data.list || [];
    const sn = {"早上":"早上診","下午":"下午診","晚上":"晚上診"};
    if (list.length === 0) { el.innerHTML = `<div style="font-size:12px;color:var(--text-light)">目前無代診安排</div>`; return; }
    el.innerHTML = list.map(function(item) {
      const dp = item.date.split("/");
      return `<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center">
        <span style="color:var(--orange-dark);font-weight:500">${dp[1]}月${dp[2]}日</span>
        <span style="color:var(--text-light)">${sn[item.session]||item.session}</span>
        <span style="font-weight:500;flex:1">${esc(item.doctor)}</span>
        <button onclick="cancelSubstitute('${esc(item.date)}','${esc(item.session)}',this)"
          style="font-size:11px;padding:2px 7px;border-radius:6px;border:1px solid var(--error);background:white;color:var(--error);cursor:pointer">取消</button>
      </div>`;
    }).join("") + `<div style="font-size:10px;color:var(--text-light);margin-top:5px">同一時段多次設定以最新一筆為準。</div>`;
  } catch(e) { el.innerHTML = `<div style="font-size:12px;color:var(--error)">代診資料暫時無法讀取，請稍後再試。</div>`; }
}

async function cancelSubstitute(date, session, btn) {
  btn.disabled = true; btn.textContent = "取消中...";
  try {
    const data = await xhrPost(API_URL, { action: "cancelSubstituteDoctor", date, session, lineId: state.lineId });
    if (data.success) loadSubstituteList();
    else { btn.disabled = false; btn.textContent = "取消"; }
  } catch(e) { btn.disabled = false; btn.textContent = "取消"; }
}

async function doSubstitute() {
  const date = document.getElementById("subDate").value;
  const session = document.getElementById("subSession").value;
  const doctor = document.getElementById("subDoctor").value.trim();
  const errEl = document.getElementById("subError");
  const sucEl = document.getElementById("subSuccess");
  errEl.style.display = "none"; sucEl.style.display = "none";
  if (!date || !session || !doctor) { errEl.textContent = "請確認日期、時段與醫師姓名均已填寫。"; errEl.style.display = "block"; return; }
  const btn = document.getElementById("btnSub");
  btn.disabled = true; btn.textContent = "更新中...";
  try {
    const data = await xhrPost(API_URL, { action: "updateSubstituteDoctor", date: date.replace(/-/g,"/"), session, doctor, lineId: state.lineId });
    if (data.success) {
      sucEl.textContent = `✓ 已更新：${date} ${session}診 → ${doctor}`; sucEl.style.display = "block";
      document.getElementById("subDate").value = "";
      document.getElementById("subSession").value = "";
      document.getElementById("subDoctor").value = "";
      loadSubstituteList();
    } else { errEl.textContent = data.error || "更新未完成，請稍後再試。"; errEl.style.display = "block"; }
  } catch(e) { errEl.textContent = "更新未完成，請稍後再試。"; errEl.style.display = "block"; }
  btn.disabled = false; btn.textContent = "確認更新";
}

/* ── 進階查詢 ── */
async function doQuery() {
  const name = document.getElementById("qName").value.trim();
  const phone = document.getElementById("qPhone").value.trim();
  const birth = document.getElementById("qBirth").value.trim();
  const errEl = document.getElementById("qError");
  errEl.style.display = "none";
  if (!name && !phone && !birth) { errEl.textContent = "請至少輸入姓名、電話或生日其中一項。"; errEl.style.display = "block"; return; }
  const btn = document.getElementById("btnQuery");
  btn.disabled = true; btn.textContent = "查詢中...";
  try {
    const data = await xhrPost(API_URL, { action: "adminQueryBookings", name, phone, birth, lineId: state.lineId });
    renderQueryResults(data.bookings || []);
  } catch(e) { errEl.textContent = "查詢未完成，請稍後再試。"; errEl.style.display = "block"; }
  btn.disabled = false; btn.textContent = "查詢";
}

function renderQueryResults(bookings) {
  const el = document.getElementById("queryResults");
  if (bookings.length === 0) { el.innerHTML = `<div style="text-align:center;padding:16px;color:var(--text-light);font-size:13px">🔍 查無預約紀錄</div>`; return; }
  let html = `<div class="divider"></div>`;
  bookings.forEach(function(b) {
    const slotDisplay = b.type === "初診" ? b.checkInTime + "前" : b.slot === "不指定" ? "不指定" : b.slot + "號";
    html += `<div class="result-item">
      <div class="result-header"><div class="result-date">${esc(b.date)} ${esc(b.displayName)}</div><div class="result-status">${esc(b.status)}</div></div>
      <div class="result-detail">${esc(b.name)}　${slotDisplay}　${esc(b.type)}${b.doctor?"　醫師："+esc(b.doctor):""}</div>
      ${b.status!=="已取消"?`<button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="confirmCancel('${esc(b.bookingId)}','${esc(b.name)}','${esc(b.date)}')">取消此預約</button>`:""}
    </div>`;
  });
  el.innerHTML = html;
}

function confirmCancel(bookingId, name, date) {
  state.pendingCancelId = bookingId;
  document.getElementById("cancelConfirmText").textContent = `確定要取消 ${name} 的 ${date} 預約嗎？取消後將自動發送LINE通知給病患。`;
  document.getElementById("cancelError").style.display = "none";
  closeModal("modalQuery");
  openModal("modalCancelConfirm");
}

async function doCancel() {
  const btn = document.getElementById("btnConfirmCancel");
  btn.disabled = true; btn.textContent = "取消中...";
  try {
    const data = await xhrPost(API_URL, { action: "cancelBooking", bookingId: state.pendingCancelId, lineId: state.lineId });
    if (data.success) {
      closeModal("modalCancelConfirm"); openModal("modalQuery");
      document.getElementById("queryResults").innerHTML = `<div class="alert alert-success">預約已取消，LINE通知已發送。</div>`;
    } else { document.getElementById("cancelError").textContent = data.error || "取消未完成，請稍後再試。"; document.getElementById("cancelError").style.display = "block"; }
  } catch(e) { document.getElementById("cancelError").textContent = "取消未完成，請稍後再試。"; document.getElementById("cancelError").style.display = "block"; }
  btn.disabled = false; btn.textContent = "確認取消並發送通知";
}

/* ── 群發訊息 ── */
async function doBroadcastPreview() {
  const start = document.getElementById("bcStart").value;
  const end = document.getElementById("bcEnd").value;
  const message = document.getElementById("bcMessage").value.trim();
  const errEl = document.getElementById("bcError");
  errEl.style.display = "none";
  if (!start || !end || !message) { errEl.textContent = "請確認日期範圍與訊息內容均已填寫。"; errEl.style.display = "block"; return; }
  if (start > end) { errEl.textContent = "結束日期需在開始日期之後，請重新選擇。"; errEl.style.display = "block"; return; }
  const btn = document.getElementById("btnBcPreview");
  btn.disabled = true; btn.textContent = "計算中...";
  try {
    const data = await xhrPost(API_URL, { action: "broadcastPreview", startDate: start.replace(/-/g,"/"), endDate: end.replace(/-/g,"/"), lineId: state.lineId });
    if (data.success) {
      state.bcPreviewCount = data.count;
      const preview = document.getElementById("bcPreview");
      preview.textContent = `預計發送給 ${data.count} 位病患`; preview.style.display = "block";
      if (data.count > 0) document.getElementById("btnBcSend").style.display = "block";
    } else { errEl.textContent = data.error || "操作未完成，請稍後再試。"; errEl.style.display = "block"; }
  } catch(e) { errEl.textContent = "操作未完成，請稍後再試。"; errEl.style.display = "block"; }
  btn.disabled = false; btn.textContent = "預覽發送人數";
}

async function doBroadcastSend() {
  const start = document.getElementById("bcStart").value;
  const end = document.getElementById("bcEnd").value;
  const message = document.getElementById("bcMessage").value.trim();
  const errEl = document.getElementById("bcError");
  const sucEl = document.getElementById("bcSuccess");
  errEl.style.display = "none"; sucEl.style.display = "none";
  if (!confirm(`確定要發送訊息給 ${state.bcPreviewCount} 位病患嗎？`)) return;
  const btn = document.getElementById("btnBcSend");
  btn.disabled = true; btn.textContent = "發送中...";
  try {
    const data = await xhrPost(API_URL, { action: "sendAnnouncement", startDate: start.replace(/-/g,"/"), endDate: end.replace(/-/g,"/"), message, lineId: state.lineId });
    if (data.success) { sucEl.textContent = `✓ 已成功發送給 ${data.sentCount} 位病患`; sucEl.style.display = "block"; btn.style.display = "none"; document.getElementById("bcPreview").style.display = "none"; }
    else { errEl.textContent = data.error || "操作未完成，請稍後再試。"; errEl.style.display = "block"; }
  } catch(e) { errEl.textContent = "操作未完成，請稍後再試。"; errEl.style.display = "block"; }
  btn.disabled = false; btn.textContent = "確認發送";
}

/* ── 資安監控 ── */
async function loadSecurity() {
  const el = document.getElementById("securityContent");
  el.innerHTML = `<div class="loading">載入中...</div>`;
  try {
    const data = await xhrGet(`${API_URL}?action=getSecurityLog&lineId=${state.lineId}`);
    const logs = data.logs || [];
    if (logs.length === 0) { el.innerHTML = `<div class="empty-state">✅ 目前無異常記錄</div>`; return; }
    el.innerHTML = logs.slice(0,50).map(function(log) {
      return `<div class="log-item"><div class="log-time">${esc(log.time)}</div><div style="margin:2px 0;font-size:11px">${esc(log.lineId)}</div><div style="margin:2px 0;font-size:11px">姓名：${esc(log.name)}</div><div class="log-event">${esc(log.event)}</div></div>`;
    }).join("");
  } catch(e) { el.innerHTML = `<div class="alert alert-error">記錄暫時無法載入，請稍後再試。</div>`; }
}

initLiff();
</script>
