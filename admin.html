<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>悅心診所 Admin Portal</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@200;400;700&display=swap');

  /* ════════════════════════════════
     PANTONE 2026 Tropic Tonalities
     + Cloud Dancer
  ════════════════════════════════ */
  :root {
    /* Tropic Tonalities */
    --marigold:     #FF7A00;
    --marigold-dk:  #CC6200;
    --capri:        #00B5E2;
    --kiwi:         #8CC63F;
    --yellow:       #FFD700;
    --yellow-dk:    #CCB000;
    --pink:         #E8366A;
    --orchid:       #9B59B6;
    --sunny:        #C8D400;
    /* 石墨暗色系 */
    --bg:           #1E1E24;
    --bg-2:         #26262E;
    --bg-3:         #2E2E38;
    --white:        #1E1E24;
    --text:         #F2EFE4;
    --text-light:   #9090A0;
    --border:       #3A3A48;
    --empty-bg:     transparent;
    --empty-text:   #3A3A48;
    /* 語意別名 */
    --orange:       #FF7A00;
    --orange-dark:  #CC6200;
    --orange-light: #2A2010;
    --purple:       #8CC63F;
    --green-metro:  #FFD700;
    --teal:         #00B5E2;
    --error:        #FF4444;
    --success:      #8CC63F;
    --green-light:  #1A2410;
    --cocoa:        #9B59B6;
    --mango:        #FFD700;
    --cloud:        #F2EFE4;
  }

  /* ── 全域重置 ── */
  * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; box-shadow: none !important; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: "Segoe UI", "Noto Sans TC", sans-serif; background: var(--white); color: var(--text); }

  /* ── Auth ── */
  #pageAuth { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; background: var(--bg); }
  .auth-card { background: var(--bg-3); padding: 40px 32px; text-align: center; max-width: 320px; width: 100%; }
  .auth-icon { font-size: 48px; margin-bottom: 16px; }
  .auth-title { font-size: 20px; font-weight: 700; color: var(--marigold); margin-bottom: 8px; letter-spacing: 2px; }
  .auth-sub { font-size: 13px; color: var(--text-light); line-height: 1.6; }

  /* ── Main ── */
  #pageMain { display: none; height: 100vh; flex-direction: column; overflow: hidden; }

  /* ── Header：白底＋橘色底線 ── */
  .header { background: var(--bg); border-bottom: 3px solid var(--marigold); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-left h1 { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 3px; }
  .header-left p { font-size: 11px; color: var(--text-light); margin-top: 1px; }
  .header-badge { background: var(--marigold); color: var(--white); padding: 4px 12px; font-size: 12px; font-weight: 400; }

  /* ── 手機版欄位順序 ── */
  .col-left { order: 2; }
  .col-center { order: 1; }
  .col-right { order: 3; }
  .desktop-body { display: flex; flex-direction: column; }

  /* ── Section Title ── */
  .section-title { font-size: 11px; font-weight: 200; color: var(--text-light); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; letter-spacing: 1px; text-transform: uppercase; }
  .section-title::before { content: ''; width: 4px; height: 14px; background: var(--marigold); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 3px; margin-bottom: 6px; }
  .tab-btn { flex: 1; padding: 8px 4px; border: none; font-size: 12px; font-family: inherit; background: var(--bg-3); color: var(--text-light); cursor: pointer; transition: all 0.15s; font-weight: 400; }
  .tab-btn:active { transform: scale(0.96); opacity: 0.9; transition: all 0.1s ease-out; }
  .tab-btn.active { background: var(--marigold); color: var(--white); font-weight: 700; }

  /* ── Session Info Row ── */
  .session-info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: var(--bg-3); margin-bottom: 6px; border-left: 4px solid var(--marigold); }
  .session-doctor { font-size: 15px; font-weight: 400; color: var(--text); }
  .session-counts { display: flex; gap: 4px; }
  .count-badge { padding: 2px 7px; font-size: 12px; font-weight: 400; }
  .count-new { background: var(--marigold); color: var(--white); }
  .count-rt { background: var(--kiwi); color: var(--white); }
  .count-un { background: #888; color: var(--white); }

  /* ── Panel Header ── */
  .panel-header { flex-shrink: 0; padding: 8px 10px 4px; background: var(--bg); }

  /* ── Panel Schedule ── */
  .panel-schedule { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 0 10px 4px; overflow: hidden; background: var(--bg); }
  .schedule-scroll { flex: 1; overflow-y: auto; min-height: 0; }

  /* ════════════════════════════════
     30格 Metro 動態磚
  ════════════════════════════════ */
  .grid-30 { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 4px; padding: 2px 0 6px; }

  .grid-cell {
    position: relative;
    background: transparent;
    border: none;
    padding: 6px 6px 4px;
    display: flex;
    flex-direction: column;
    min-height: 56px;
    aspect-ratio: 1 / 1;
    cursor: default;
    overflow: hidden;
  }
  .grid-cell:not(.empty):active { transform: scale(0.96); opacity: 0.9; transition: all 0.1s ease-out; }

  .grid-cell.has-patient { background: var(--marigold); }
  .grid-cell.admin-pending { background: var(--kiwi); cursor: pointer; }
  .grid-cell.admin-notified { background: var(--yellow); cursor: pointer; }
  .grid-cell.empty { background: transparent; }

  /* 號碼：左上角，細體 */
  .cell-num { font-size: 22px; font-weight: 400; line-height: 1; align-self: flex-start; }
  .grid-cell.has-patient .cell-num { color: var(--white); }
  .grid-cell.admin-pending .cell-num { color: var(--white); }
  .grid-cell.admin-notified .cell-num { color: var(--text); }
  .grid-cell.empty .cell-num { color: var(--empty-text); font-weight: 200; }

  /* 姓名：左下角，粗體 */
  .cell-name {
    font-size: 11px;
    font-weight: 700;
    position: absolute;
    bottom: 5px;
    left: 6px;
    right: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .grid-cell.has-patient .cell-name { color: rgba(255,255,255,0.92); }
  .grid-cell.admin-pending .cell-name { color: rgba(255,255,255,0.92); }
  .grid-cell.admin-notified .cell-name { color: rgba(0,0,0,0.7); }
  .grid-cell.empty .cell-name { color: transparent; }

  /* ── 初診橫幅 ── */
  .grid-np-banner {
    grid-column: 1 / -1;
    border: none;
    padding: 6px 12px 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 56px;
    height: calc((100vw - 20px - 4px * 4) / 5);
  }
  .grid-np-banner:active { transform: scale(0.99); opacity: 0.9; transition: all 0.1s ease-out; }
  .grid-np-banner.has-patient { background: var(--marigold); }
  .grid-np-banner.has-patient .np-banner-time { color: rgba(255,255,255,0.8); }
  .grid-np-banner.has-patient .np-banner-name { color: var(--white); }
  .grid-np-banner.admin-pending { background: var(--kiwi); cursor: pointer; }
  .grid-np-banner.admin-pending .np-banner-time { color: rgba(255,255,255,0.8); }
  .grid-np-banner.admin-pending .np-banner-name { color: var(--white); }
  .grid-np-banner.admin-notified { background: var(--yellow); cursor: pointer; }
  .grid-np-banner.admin-notified .np-banner-time { color: rgba(0,0,0,0.6); }
  .grid-np-banner.admin-notified .np-banner-name { color: var(--text); }
  .np-banner-time { font-size: 12px; flex-shrink: 0; font-weight: 200; }
  .np-banner-name { flex: 1; font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── 報到按鈕 ── */
  .checkin-mini {
    flex-shrink: 0;
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    border: none;
    white-space: nowrap;
  }
  .checkin-mini:active { transform: scale(0.96); opacity: 0.9; transition: all 0.1s ease-out; }
  .checkin-mini.pending { background: rgba(255,255,255,0.25); color: var(--white); }
  .checkin-mini.pending:hover { background: rgba(255,255,255,0.4); }
  .checkin-mini.done { background: rgba(0,0,0,0.15); color: var(--white); }
  .checkin-mini.done:hover { background: rgba(200,0,0,0.5); }

  /* ── 不指定按鈕 ── */
  .unspec-btn {
    width: 100%;
    margin-top: 4px;
    padding: 12px;
    background: var(--bg-3);
    border: 2px dashed var(--border);
    font-size: 15px;
    font-family: inherit;
    font-weight: 400;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    flex-shrink: 0;
  }
  .unspec-btn:hover { background: var(--marigold); color: var(--white); border-color: var(--marigold); }
  .unspec-btn:active { transform: scale(0.98); opacity: 0.9; transition: all 0.1s ease-out; }

  /* ── 心理治療區 ── */
  .panel-therapy { flex-shrink: 0; min-height: 72px; padding: 6px 10px; border-top: 2px solid var(--border); }
  .therapy-card { background: var(--bg-3); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; border-left: 4px solid var(--capri); }
  .therapy-title { font-size: 15px; font-weight: 700; color: var(--capri); }
  .therapy-sub { font-size: 12px; font-weight: 200; color: var(--text-light); margin-top: 2px; }
  .therapy-badge { background: var(--capri); color: var(--white); padding: 4px 12px; font-size: 10px; font-weight: 400; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }

  /* ── 櫃台功能區 ── */
  .panel-tools { flex-shrink: 0; padding: 6px 10px 10px; border-top: 2px solid var(--border); }
  .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .tool-card {
    padding: 14px 12px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 64px;
  }
  .tool-card:active { transform: scale(0.96); opacity: 0.9; transition: all 0.1s ease-out; }
  .tool-card:nth-child(1) { background: var(--marigold); }
  .tool-card:nth-child(2) { background: var(--capri); }
  .tool-card:nth-child(3) { background: var(--pink); }
  .tool-card:nth-child(4) { background: var(--orchid); }
  .tool-name { font-size: 15px; font-weight: 700; color: var(--white); }
  .tool-desc { font-size: 11px; font-weight: 200; color: rgba(255,255,255,0.8); line-height: 1.3; margin-top: 1px; }

  /* ── 日期導覽列 ── */
  .date-nav { display: flex; align-items: center; gap: 3px; margin-bottom: 6px; }
  .date-nav-btn {
    flex-shrink: 0;
    padding: 8px 12px;
    border: none;
    background: var(--bg-3);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
  }
  .date-nav-btn:hover { background: var(--marigold); color: var(--white); }
  .date-nav-btn:active { transform: scale(0.96); opacity: 0.9; transition: all 0.1s ease-out; }
  .date-nav-btn:disabled { background: var(--bg-2); color: var(--border); cursor: not-allowed; }
  .date-nav-btn:disabled:hover { background: var(--bg-2); color: var(--border); transform: none; }
  .date-nav-btn.today { font-size: 13px; padding: 8px 10px; color: var(--text-light); background: var(--bg-3); }
  .date-nav-btn.today:hover { background: var(--marigold); color: var(--white); }
  .date-nav-center { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: var(--bg-2); padding: 8px 4px; }
  .date-nav-label { font-size: 15px; font-weight: 400; color: var(--text); pointer-events: none; white-space: nowrap; }
  .date-nav-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; border: none; background: transparent; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .loading-overlay.active { display: flex; }
  .loading-overlay-text { color: var(--cloud); font-size: 15px; font-weight: 400; letter-spacing: 1px; text-align: center; line-height: 1.8; }
  .loading-overlay-bar { width: 200px; height: 3px; background: var(--bg-3); overflow: hidden; }
  .loading-overlay-bar-inner { height: 100%; width: 40%; background: var(--marigold); animation: loadingSlide 1.2s ease-in-out infinite; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--white); padding: 24px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; border-top: 4px solid var(--marigold); }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--marigold); padding-left: 10px; }
  .modal-close { margin-left: auto; background: none; border: none; font-size: 16px; font-weight: 400; cursor: pointer; color: var(--text-light); padding: 2px 8px; letter-spacing: 1px; }

  /* ── Form ── */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 10px; color: var(--text-light); margin-bottom: 4px; font-weight: 200; letter-spacing: 2px; text-transform: uppercase; }
  input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 10px 12px; border: none; border-bottom: 2px solid var(--border); border-left: 4px solid var(--border); font-size: 14px; font-family: inherit; color: var(--text); background: #FAFAFA; transition: all 0.15s; outline: none; font-weight: 400; }
  input:focus, select:focus, textarea:focus { border-bottom-color: var(--marigold); border-left-color: var(--marigold); background: var(--white); }
  textarea { resize: vertical; min-height: 70px; }
  .date-row { display: flex; gap: 8px; }
  .date-row .form-group { flex: 1; }

  .btn { width: 100%; padding: 13px; border: none; font-size: 14px; font-family: inherit; font-weight: 400; cursor: pointer; letter-spacing: 1px; margin-bottom: 8px; }
  .btn:active { transform: scale(0.98); opacity: 0.9; transition: all 0.1s ease-out; }
  .btn-primary { background: var(--marigold); color: var(--white); }
  .btn-primary:hover { background: var(--marigold-dk); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-outline { background: var(--white); color: var(--marigold); border: 2px solid var(--marigold); }
  .btn-danger { background: var(--white); color: var(--error); border: 2px solid var(--error); }
  .btn-danger:hover { background: var(--error); color: var(--white); }
  .btn-sm { width: auto; padding: 7px 14px; font-size: 12px; margin-bottom: 0; }

  .alert { padding: 10px 12px; font-size: 13px; margin-bottom: 10px; line-height: 1.6; border-left: 4px solid; }
  .alert-error { background: #2A1010; color: var(--error); border-color: var(--error); }
  .alert-success { background: var(--green-light); color: var(--kiwi); border-color: var(--kiwi); }
  .alert-info { background: var(--orange-light); color: var(--marigold); border-color: var(--marigold); }

  .result-item { padding: 12px; border-left: 4px solid var(--border); margin-bottom: 8px; background: var(--bg-3); }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .result-date { font-size: 13px; font-weight: 400; }
  .result-status { font-size: 11px; padding: 2px 7px; background: var(--kiwi); color: var(--white); font-weight: 700; }
  .result-detail { font-size: 12px; font-weight: 200; color: var(--text-light); line-height: 1.8; }

  .log-item { padding: 9px 11px; border-left: 4px solid var(--error); background: #2A1010; margin-bottom: 7px; font-size: 12px; line-height: 1.6; }
  .log-time { color: var(--text-light); font-size: 10px; }
  .log-event { color: var(--error); font-weight: 700; }
  .divider { height: 2px; background: var(--border); margin: 12px 0; }
  .preview-count { background: var(--orange-light); color: var(--marigold); padding: 9px 12px; font-size: 13px; font-weight: 700; margin-bottom: 10px; text-align: center; border-left: 4px solid var(--marigold); }

  .loading { text-align: center; padding: 20px; color: var(--text-light); font-size: 13px; }
  .loading-bar-wrap { width: 100%; height: 4px; background: var(--bg-3); margin: 10px 0 4px; overflow: hidden; }
  .loading-bar { height: 100%; width: 40%; background: var(--marigold); animation: loadingSlide 1.2s ease-in-out infinite; }
  @keyframes loadingSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }
  .empty-state { text-align: center; padding: 20px; color: var(--text-light); font-size: 13px; }

  /* ── 異常排班區塊 ── */
  .conflict-zone { margin-top: 6px; border-left: 4px solid var(--error); padding: 8px 10px; background: #2A1010; flex-shrink: 0; }
  .conflict-title { font-size: 12px; font-weight: 700; color: var(--error); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
  .conflict-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #FFCCCC; font-size: 12px; }
  .conflict-row:last-child { border-bottom: none; }
  .conflict-slot { font-weight: 700; color: var(--error); min-width: 32px; }
  .conflict-name { font-weight: 200; flex: 1; }
  .conflict-note { font-size: 10px; color: var(--text-light); }

  /* ── 聯絡小卡 Modal ── */
  .contact-name { font-size: 24px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 4px; }
  .contact-birth { font-size: 13px; font-weight: 400; color: var(--text-light); text-align: center; margin-bottom: 8px; letter-spacing: 1px; }
  .contact-phone { display: block; font-size: 32px; font-weight: 700; color: var(--marigold); text-align: center; text-decoration: none; letter-spacing: 3px; margin-bottom: 20px; }
  .btn-notified-pending { background: var(--kiwi); color: var(--white); }
  .btn-notified-pending:hover { background: #6AA020; }
  .btn-notified-done { background: var(--yellow); color: var(--text); }
  .btn-notified-done:hover { background: var(--error); color: var(--white); }

  /* ── 不指定 Modal 列表 ── */
  .unspec-modal-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .unspec-modal-row:last-child { border-bottom: none; }
  .unspec-modal-num { font-size: 11px; color: var(--text-light); width: 18px; text-align: center; flex-shrink: 0; }
  .unspec-modal-name { font-weight: 400; flex: 1; }

  /* ════════════════════════════════════════════════
     響應式佈局 — 平板／電腦（768px 以上）
  ════════════════════════════════════════════════ */
  @media (min-width: 768px) {
    body { background: var(--bg); }
    #pageMain { height: 100vh; overflow: hidden; }

    .header { padding: 16px 28px; }
    .header-left h1 { font-size: 24px; letter-spacing: 4px; }
    .header-left p { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 6px 18px; }

    .desktop-body {
      display: grid;
      grid-template-columns: 2fr 6fr 2fr;
      gap: 0;
      flex: 1;
      min-height: 0;
      height: calc(100vh - 61px);
      overflow: hidden;
    }

    .col-left { background: var(--bg-2); border-right: 2px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 16px 12px; order: 1; }
    .col-center { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); order: 2; }
    .col-right { background: var(--bg-2); border-left: 2px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 16px 12px; order: 3; }

    .col-center .panel-schedule { flex: 1; min-height: 0; padding: 12px 16px 8px; }
    .col-left .panel-therapy { border-top: none; padding: 0; }
    .col-right .panel-tools { border-top: none; padding: 0; }

    .col-right .tools-grid { grid-template-columns: 1fr; gap: 4px; }
    .col-right .tool-card { padding: 18px 16px; min-height: 72px; }
    .col-right .tool-name { font-size: 16px; }
    .col-right .tool-desc { font-size: 12px; }

    .grid-cell { min-height: 80px; aspect-ratio: unset; }
    .grid-np-banner { min-height: 80px; height: 80px; padding: 6px 16px 4px; }
    .cell-num { font-size: 28px; }
    .cell-name { font-size: 12px; bottom: 7px; left: 8px; }
    .np-banner-time { font-size: 14px; }
    .np-banner-name { font-size: 18px; }
    .checkin-mini { font-size: 14px; padding: 8px 16px; }

    .date-nav-label { font-size: 18px; }
    .date-nav-btn { font-size: 18px; padding: 10px 16px; }
    .date-nav-btn.today { font-size: 14px; }
    .tab-btn { font-size: 14px; padding: 10px 6px; }
    .session-doctor { font-size: 18px; }

<script>
// 前端副本：和 GAS DEFAULT_DOCTOR_SCHEDULE 保持同步
const DEFAULT_DOCTOR_SCHEDULE = {
  1: { "早上": "粟寧",   "下午": "粟寧",   "晚上": "王伯元" },
  2: { "早上": "王麟祥", "下午": "粟寧",   "晚上": "郭玉柱" },
  3: { "早上": "粟寧",   "下午": "郭玉柱", "晚上": "粟寧"   },
  4: { "早上": "粟寧",   "下午": "粟寧",   "晚上": "王麟祥" },
  5: { "早上": "郭玉柱", "下午": "王伯元", "晚上": "粟寧"   },
  6: { "早上": "粟寧",   "下午": "",       "晚上": ""        }
};
const API_URL = "https://script.google.com/macros/s/AKfycbz1IB0HCFWaFlC7odExNsOWaZwTjz7osAjstXhx_5V0ZD4Ya58GGRRPfFAun2Itywbh6A/exec";
let state = { lineId: "", adminName: "", pendingCancelId: "", bcPreviewCount: 0, viewDate: new Date(), contactBookingId: "", contactIsNotified: false };
let allBookings = [], activeSession = "";

function dateToYMD(d) {
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
}
function dateToDisplay(d) {
  const weekdays = ["日","一","二","三","四","五","六"];
  return d.getFullYear() + "/" + String(d.getMonth()+1).padStart(2,"0") + "/" + String(d.getDate()).padStart(2,"0") + " (" + weekdays[d.getDay()] + ")";
}
function updateDateNav() {
  document.getElementById("dateNavLabel").textContent = dateToDisplay(state.viewDate);
  const ymd = dateToYMD(state.viewDate);
  document.getElementById("dateNavInput").value = ymd.substring(0,4) + "-" + ymd.substring(4,6) + "-" + ymd.substring(6,8);
  // 今天以前不能往前
  const today = new Date(); today.setHours(0,0,0,0);
  const view = new Date(state.viewDate); view.setHours(0,0,0,0);
  document.querySelector(".date-nav-btn[onclick='changeDate(-1)']").disabled = (view <= today);
}
function changeDate(offset) {
  const d = new Date(state.viewDate);
  d.setDate(d.getDate() + offset);
  state.viewDate = d;
  updateDateNav();
  loadSchedule();
}
function goToToday() {
  state.viewDate = new Date();
  updateDateNav();
  loadSchedule();
}
function goToNextWorkday() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  if (d.getDay() === 0) d.setDate(d.getDate() + 1); // 跳過週日
  state.viewDate = d;
  updateDateNav();
  loadSchedule();
}
function onDatePick(e) {
  const parts = e.target.value.split("-");
  if (parts.length !== 3) return;
  state.viewDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  updateDateNav();
  loadSchedule();
}

async function initLiff() {
  try {
    await liff.init({ liffId: "2009340533-qmLOBHw1" });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    state.lineId = profile.userId;
    const verify = await xhrGet(`${API_URL}?action=verifyAdmin&lineId=${state.lineId}`);
    if (!verify.success) {
      document.getElementById("pageAuth").innerHTML = `<div class="auth-card"><div class="auth-title">頁面錯誤</div></div>`;
      return;
    }
    state.adminName = verify.name;
    document.getElementById("adminBadge").textContent = state.adminName.toUpperCase();
    document.getElementById("pageAuth").style.display = "none";
    document.getElementById("pageMain").style.display = "flex";
    updateDateNav();
    loadSchedule();
  } catch(e) {
    document.getElementById("pageAuth").innerHTML = `<div class="auth-card"><div class="auth-title">暫時無法連線</div><div class="auth-sub">請重新整理頁面。</div></div>`;
  }
}

var XHR_TIMEOUT = 30000; // 30秒

function xhrParseResponse(text) {
  if (typeof text === "string" && text.trimStart().charAt(0) === "<") {
    throw new Error("SERVER_HTML"); // GAS 回傳 HTML 錯誤頁
  }
  return JSON.parse(text);
}

function xhrGet(url) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);
    xhr.timeout = XHR_TIMEOUT;
    xhr.onload = function() {
      try { resolve(xhrParseResponse(xhr.responseText)); }
      catch(e) { reject(e); }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.ontimeout = function() { reject(new Error("Timeout")); };
    xhr.send();
  });
}

function xhrPost(url, payload) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open("POST", url, true);
    xhr.setRequestHeader("Content-Type", "text/plain");
    xhr.timeout = XHR_TIMEOUT;
    xhr.onload = function() {
      try { resolve(xhrParseResponse(xhr.responseText)); }
      catch(e) { reject(e); }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.ontimeout = function() { reject(new Error("Timeout")); };
    xhr.send(JSON.stringify(payload));
  });
}
function getTodayStr() { const n = new Date(); return n.getFullYear() + "/" + String(n.getMonth()+1).padStart(2,"0") + "/" + String(n.getDate()).padStart(2,"0"); }
function esc(str) { return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function loadSchedule() {
  document.getElementById("scheduleContent").innerHTML = `<div class="loading"><div class="loading-bar-wrap"><div class="loading-bar"></div></div>載入診表中...</div>`;
  document.getElementById("sessionTabs").innerHTML = "";
  document.getElementById("sessionInfoRow").style.display = "none";
  try {
    const data = await xhrGet(`${API_URL}?action=adminGetTodaySchedule&date=${dateToYMD(state.viewDate)}&lineId=${state.lineId}`);
    renderSchedule(data.bookings || []);
  } catch(e) {
    document.getElementById("scheduleContent").innerHTML = `<div class="alert alert-error">診表暫時無法載入，請重新整理頁面。</div>`;
  }
}

function renderSchedule(bookings) {
  allBookings = bookings;
  const tabEl = document.getElementById("sessionTabs");
  const el = document.getElementById("scheduleContent");
  const sn = {"早上":"早上診","下午":"下午診","晚上":"晚上診"};
  // 根據當天星期幾決定開診時段（不依賴是否有預約）
  const dow = state.viewDate.getDay(); // 0=日,1=一...6=六
  const daySchedule = DEFAULT_DOCTOR_SCHEDULE[dow] || {};
  const openSessions = ["早上","下午","晚上"].filter(s => daySchedule[s] && daySchedule[s] !== "");
  if (openSessions.length === 0) {
    tabEl.innerHTML = "";
    document.getElementById("sessionInfoRow").style.display = "none";
    el.innerHTML = `<div class="empty-state">今日無開診</div>`;
    return;
  }
  tabEl.innerHTML = openSessions.map(function(s) {
    const count = bookings.filter(b => b.session === s).length;
    return `<button class="tab-btn" id="tab-${s}" onclick="switchTab('${s}')">${sn[s]} ${count}</button>`;
  }).join("");
  activeSession = openSessions[0];
  renderSessionContent(activeSession);
  document.getElementById("tab-" + activeSession).classList.add("active");
}

function switchTab(session) {
  activeSession = session;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + session).classList.add("active");
  renderSessionContent(session);
}

/* ════════════════════════════════════════════════
   核心渲染：30 格儀表板
   ════════════════════════════════════════════════ */
function renderSessionContent(session) {
  const el = document.getElementById("scheduleContent");
  const list = allBookings.filter(b => b.session === session);
  const npList = list.filter(b => b.type === "初診")
    .slice().sort(function(a, b) {
      return parseInt(a.slot || "0") - parseInt(b.slot || "0");
    });

  // 初診時間碼 → index 對照（和 GAS getNewPatientSlotTimes 邏輯一致）
  const NP_SLOT_CONFIG = {
    "早上": { startHour: 9,  startMin: 0,  offset: 15 },
    "下午": { startHour: 14, startMin: 0,  offset: 15 },
    "晚上": { startHour: 17, startMin: 30, offset: 15 }
  };
  function getNpRowStart(session, slotCode) {
    const cfg = NP_SLOT_CONFIG[session];
    if (!cfg) return null;
    for (let i = 0; i < 5; i++) {
      const totalMin = cfg.startHour * 60 + cfg.startMin + cfg.offset + i * 30;
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      const code = String(h).padStart(2,"0") + String(m).padStart(2,"0");
      if (code === String(slotCode).padStart(4,"0")) return 5 + i * 5; // index: 5,10,15,20,25
    }
    return null;
  }
  const rtList = list.filter(b => b.type !== "初診" && b.slot !== "不指定");
  const unList = list.filter(b => b.type !== "初診" && b.slot === "不指定");
  const doctor = list.length > 0 ? list[0].doctor : "";

  // 資訊列
  const infoRow = document.getElementById("sessionInfoRow");
  infoRow.style.display = list.length > 0 ? "flex" : "none";
  const isSubstitute = list.length > 0 && list[0].isSubstitute;
  const doctorLabel = doctor ? (isSubstitute ? "*代診 " + doctor + " 醫師" : doctor + " 醫師") : "";
  document.getElementById("sessionDoctorText").textContent = doctorLabel;
  document.getElementById("sessionCountBadges").innerHTML =
    `<span class="count-badge count-new">初診 ${npList.length}</span>` +
    `<span class="count-badge count-rt">複診 ${rtList.length}</span>` +
    (unList.length > 0 ? `<span class="count-badge count-un">不指定 ${unList.length}</span>` : "");

  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state">📋 此時段無預約</div>`;
    return;
  }

  /*
    格子配置邏輯：
    - 1-5 號（index 0-4）：固定小格，永不被初診佔用
    - 從第 6 格（index 5）起，每 5 格為一列
      第 1 位初診佔 index 5-9（6-10 號位置）
      第 2 位初診佔 index 10-14（11-15 號位置）
      依此類推，最多 5 位初診佔用 6-30 號
    - 每位複診依 slot 塞入對應 index（slot-1）
    - 若某列被初診佔用，該列的複診改插入剩餘空格
  */

  // 建立 30 格陣列，預設為空
  // 每格格式：{ type: 'empty' | 'rt' | 'np_banner', ...data }
  const cells = [];
  for (let i = 0; i < 30; i++) cells.push({ type: "empty", num: i + 1 });

  // 初診佔用的列集合，依時間碼對應固定 rowStart
  const npRowStarts = new Set();
  npList.forEach(function(np) {
    const rowStart = getNpRowStart(session, np.slot);
    if (rowStart !== null) npRowStarts.add(rowStart);
  });

  // 塞入複診（slot 決定位置）
  // 若與初診格位衝突，收入 conflictList 而非直接隱藏
  const conflictList = [];
  rtList.forEach(function(b) {
    const slot = parseInt(b.slot, 10);
    if (slot >= 1 && slot <= 30) {
      const idx = slot - 1;
      const rowStart = idx < 5 ? null : Math.floor((idx - 5) / 5) * 5 + 5;
      if (rowStart !== null && npRowStarts.has(rowStart)) {
        // 格位與初診橫幅衝突 → 收入異常清單，不隱藏
        conflictList.push(b);
        return;
      }
      cells[idx] = { type: "rt", num: slot, name: b.name, bookingId: b.bookingId, status: b.status, phone: b.phone || "", isAdminBooking: b.isAdminBooking || false, note: b.note || "", birth: b.birth || "" };
    }
  });

  // 將初診填入對應 rowStart（依時間碼對應固定位置）
  npList.forEach(function(np) {
    const rowStart = getNpRowStart(session, np.slot);
    if (rowStart !== null && rowStart < 30) {
      cells[rowStart] = {
        type: "np_banner",
        checkInTime: np.checkInTime,
        name: np.name,
        bookingId: np.bookingId,
        status: np.status,
        phone: np.phone || "",
        isAdminBooking: np.isAdminBooking || false,
        note: np.note || "",
        birth: np.birth || ""
      };
      // 把 rowStart+1 ~ rowStart+4 標記為 np_skip（渲染時略過）
      for (let k = 1; k < 5; k++) {
        if (rowStart + k < 30) cells[rowStart + k] = { type: "np_skip" };
      }
    }
  });

  // 渲染 HTML
  let html = `<div class="grid-30">`;

  for (let i = 0; i < 30; i++) {
    const c = cells[i];
    if (c.type === "np_skip") continue; // 已被 grid-column: 1/-1 佔用，不輸出

    if (c.type === "np_banner") {
      const isDone = c.status === "已看診";
      const isNotified = c.isAdminBooking && c.note.indexOf("[已通知]") !== -1;
      const bannerClass = c.isAdminBooking ? (isNotified ? "admin-notified" : "admin-pending") : "has-patient";
      const clickAttr = `data-bid="${esc(c.bookingId)}" data-name="${esc(c.name)}" data-phone="${esc(c.phone)}" data-notified="${isNotified}" data-admin="${c.isAdminBooking}" data-birth="${esc(c.birth)}" onclick="openContactModalFromEl(this)" style="cursor:pointer"`;
      const checkMark = c.isAdminBooking && isNotified ? "✓ " : "";
      html += `<div class="grid-np-banner ${bannerClass}" ${clickAttr}>
        <span class="np-banner-time">${checkMark}${esc(c.checkInTime)}前</span>
        <span class="np-banner-name">初診・${esc(c.name)}</span>
        <button class="checkin-mini ${isDone?'done':'pending'}" id="btn-${esc(c.bookingId)}"
          onclick="event.stopPropagation(); toggleCheckin('${esc(c.bookingId)}',this)">${isDone?'✓ 已看診':'未看診'}</button>
      </div>`;
    } else if (c.type === "rt") {
      const isNotified = c.isAdminBooking && c.note.indexOf("[已通知]") !== -1;
      const cellClass = c.isAdminBooking ? (isNotified ? "admin-notified" : "admin-pending") : "has-patient";
      const numDisplay = c.isAdminBooking && isNotified ? `${c.num} ✓` : `${c.num}`;
      const clickAttr = `data-bid="${esc(c.bookingId)}" data-name="${esc(c.name)}" data-phone="${esc(c.phone)}" data-notified="${isNotified}" data-admin="${c.isAdminBooking}" data-birth="${esc(c.birth)}" onclick="openContactModalFromEl(this)" style="cursor:pointer"`;
      html += `<div class="grid-cell ${cellClass}" ${clickAttr}>
        <span class="cell-num">${numDisplay}</span>
        <span class="cell-name" title="${esc(c.name)}">${esc(c.name)}</span>
      </div>`;
    } else {
      // empty
      html += `<div class="grid-cell empty">
        <span class="cell-num">${c.num}</span>
        <span class="cell-name">　</span>
      </div>`;
    }
  }

  html += `</div>`; // end grid-30

  // 不指定按鈕（全寬，grid 下方）
  if (unList.length > 0) {
    html += `<button class="unspec-btn" onclick="openUnspecModal()">查看不指定名單（${unList.length} 人）</button>`;
  }

  // 異常排班區（格位衝突，絕對不能隱藏）
  if (conflictList.length > 0) {
    html += `<div class="conflict-zone">
      <div class="conflict-title">⚠️ 異常排班（${conflictList.length} 人）—— 號碼與初診格位衝突，請人工確認</div>`;
    conflictList.forEach(function(b) {
      html += `<div class="conflict-row">
        <span class="conflict-slot">${esc(b.slot)}號</span>
        <span class="conflict-name">${esc(b.name)}</span>
        <span class="conflict-note">格位重疊</span>
      </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}

/* ── 不指定 Modal ── */

  const list = allBookings.filter(b => b.session === activeSession && b.type !== "初診" && b.slot === "不指定");

/* ── 聯絡小卡 Modal ── */
function openContactModalFromEl(el) {
  const bookingId = el.dataset.bid;
  const name = el.dataset.name;
  const phone = el.dataset.phone;
  const isNotified = el.dataset.notified === "true";
  const isAdminBooking = el.dataset.admin === "true";
  const birth = el.dataset.birth || "";
  openContactModal(bookingId, name, phone, isNotified, isAdminBooking, birth);
}

function rocDate(birthStr) {
  // 西元年轉民國年顯示，如 19900520 → 民國079年05月20日
  if (!birthStr) return "";
  const s = birthStr.toString().replace(/[^0-9]/g, "");
  if (s.length < 6) return birthStr;
  let y, m, d;
  if (s.length === 8) { y = parseInt(s.substring(0,4)); m = s.substring(4,6); d = s.substring(6,8); }
  else if (s.length === 7) { y = parseInt(s.substring(0,4)); m = s.substring(4,6); d = s.substring(6,7).padEnd(2,"0"); }
  else return birthStr;
  const roc = y - 1911;
  return "民國 " + String(roc).padStart(3,"0") + " 年 " + m + " 月 " + d + " 日";
}

function openContactModal(bookingId, name, phone, isNotified, isAdminBooking, birth) {
  state.contactBookingId = bookingId;
  state.contactIsNotified = (isNotified === true || isNotified === "true");
  const notified = state.contactIsNotified;
  document.getElementById("contactName").textContent = name;
  document.getElementById("contactBirth").textContent = birth ? rocDate(birth) : "";
  document.getElementById("contactPhone").textContent = phone || "（無電話）";
  document.getElementById("contactPhone").href = phone ? "tel:" + phone : "";
  // 只有白名單代掛才顯示通知切換按鈕
  const wrap = document.getElementById("btnToggleNotifiedWrap");
  if (isAdminBooking) {
    wrap.style.display = "block";
    const btn = document.getElementById("btnToggleNotified");
    if (notified) { btn.textContent = "✓ 已通知"; btn.className = "btn btn-notified-done"; }
    else { btn.textContent = "未通知"; btn.className = "btn btn-notified-pending"; }
    btn.disabled = false;
  } else {
    wrap.style.display = "none";
  }
  document.getElementById("contactError").style.display = "none";
  document.getElementById("modalContact").classList.add("active");
}

async function doToggleNotified() {
  const btn = document.getElementById("btnToggleNotified");
  const newIsNotified = !state.contactIsNotified;
  btn.disabled = true; btn.textContent = "更新中...";
  try {
    const data = await xhrPost(API_URL, { action: "toggleNotified", bookingId: state.contactBookingId, isNotified: newIsNotified, lineId: state.lineId });
    if (data.success) {
      closeModal("modalContact");
      loadSchedule();
    } else {
      btn.disabled = false;
      btn.textContent = state.contactIsNotified ? "✓ 已通知" : "未通知";
      alert("狀態更新未完成，請稍後再試。");
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = state.contactIsNotified ? "✓ 已通知" : "未通知";
    alert("狀態更新未完成，請稍後再試。");
  }
}

/* ── 報到切換 ── */
async function toggleCheckin(bookingId, btn) {
  const isDone = btn.classList.contains("done");
  const newStatus = isDone ? "已確認" : "已看診";
  btn.disabled = true; btn.textContent = "更新中...";
  try {
    const data = await xhrPost(API_URL, { action: "adminUpdateStatus", bookingId, status: newStatus, lineId: state.lineId });
    if (data.success) {
      if (newStatus === "已看診") { btn.classList.remove("pending"); btn.classList.add("done"); btn.textContent = "✓ 已看診"; }
      else { btn.classList.remove("done"); btn.classList.add("pending"); btn.textContent = "未看診"; }
    } else { btn.textContent = isDone ? "✓ 已看診" : "未看診"; }
  } catch(e) {
    btn.textContent = isDone ? "✓ 已看診" : "未看診";
    const errTip = document.createElement("span");
    errTip.textContent = " ⚠️ 更新失敗";
    errTip.style.cssText = "font-size:11px;color:var(--error);margin-left:4px;";
    btn.parentNode.appendChild(errTip);
    setTimeout(function() { if (errTip.parentNode) errTip.parentNode.removeChild(errTip); }, 4000);
  }
  btn.disabled = false;
}

/* ── Modal 開關 ── */
function openModal(id) {
  // 開啟前清空所有錯誤提示與輸入殘留
  document.querySelectorAll("#" + id + " .alert-error, #" + id + " .alert-success").forEach(function(el) {
    el.style.display = "none"; el.textContent = "";
  });
  document.querySelectorAll("#" + id + " input[type='text'], #" + id + " input[type='date'], #" + id + " textarea").forEach(function(el) {
    el.value = "";
  });
  document.querySelectorAll("#" + id + " select").forEach(function(el) {
    el.selectedIndex = 0;
  });
  document.getElementById(id).classList.add("active");
  if (id === "modalSecurity") loadSecurity();
  if (id === "modalSubstitute") loadSubstituteList();
}
function closeModal(id) { document.getElementById(id).classList.remove("active"); }

/* ── 代診排班 ── */
async function loadSubstituteList() {
  const el = document.getElementById("subList");
  try {
    const data = await xhrGet(`${API_URL}?action=getSubstituteList&lineId=${state.lineId}`);
    const list = data.list || [];
    const sn = {"早上":"早上診","下午":"下午診","晚上":"晚上診"};
    if (list.length === 0) { el.innerHTML = `<div style="font-size:12px;color:var(--text-light)">目前無代診安排</div>`; return; }
    el.innerHTML = list.map(function(item) {
      const dp = item.date.split("/");
      return `<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center">
        <span style="color:var(--orange-dark);font-weight:400">${dp[1]}月${dp[2]}日</span>
        <span style="color:var(--text-light)">${sn[item.session]||item.session}</span>
        <span style="font-weight:400;flex:1">${esc(item.doctor)}</span>
        <button onclick="cancelSubstitute('${esc(item.date)}','${esc(item.session)}',this)"
          style="font-size:11px;padding:2px 7px;border-radius:6px;border:1px solid var(--error);background:white;color:var(--error);cursor:pointer">取消</button>
      </div>`;
    }).join("") + `<div style="font-size:10px;color:var(--text-light);margin-top:5px">同一時段多次設定以最新一筆為準。</div>`;
  } catch(e) { el.innerHTML = `<div style="font-size:12px;color:var(--error)">代診資料暫時無法讀取，請稍後再試。</div>`; }
}

async function cancelSubstitute(date, session, btn) {
  btn.disabled = true; btn.textContent = "取消中...";
  try {
    const data = await xhrPost(API_URL, { action: "cancelSubstituteDoctor", date, session, lineId: state.lineId });
    if (data.success) loadSubstituteList();
    else { btn.disabled = false; btn.textContent = "取消"; }
  } catch(e) { btn.disabled = false; btn.textContent = "取消"; }
}

async function doSubstitute() {
  const date = document.getElementById("subDate").value;
  const session = document.getElementById("subSession").value;
  const doctor = document.getElementById("subDoctor").value.trim();
  const errEl = document.getElementById("subError");
  const sucEl = document.getElementById("subSuccess");
  errEl.style.display = "none"; sucEl.style.display = "none";
  if (!date || !session || !doctor) { errEl.textContent = "請確認日期、時段與醫師姓名均已填寫。"; errEl.style.display = "block"; return; }
  const btn = document.getElementById("btnSub");
  btn.disabled = true; btn.textContent = "更新中...";
  try {
    const data = await xhrPost(API_URL, { action: "updateSubstituteDoctor", date: date.replace(/-/g,"/"), session, doctor, lineId: state.lineId });
    if (data.success) {
      sucEl.textContent = `✓ 已更新：${date} ${session}診 → ${doctor}`; sucEl.style.display = "block";
      document.getElementById("subDate").value = "";
      document.getElementById("subSession").value = "";
      document.getElementById("subDoctor").value = "";
      loadSubstituteList();
    } else { errEl.textContent = data.error || "更新未完成，請稍後再試。"; errEl.style.display = "block"; }
  } catch(e) { errEl.textContent = "更新未完成，請稍後再試。"; errEl.style.display = "block"; }
  btn.disabled = false; btn.textContent = "確認更新";
}

/* ── 進階查詢 ── */
async function doQuery() {
  const name = document.getElementById("qName").value.trim();
  const phone = document.getElementById("qPhone").value.trim();
  const birthY = document.getElementById("qBirthY").value.trim();
  const birthM = document.getElementById("qBirthM").value.trim();
  const birthD = document.getElementById("qBirthD").value.trim();
  // 三格任一有填就組合，民國年+1911轉西元年
  let birth = "";
  if (birthY || birthM || birthD) {
    if (!birthY || !birthM || !birthD) {
      const errEl = document.getElementById("qError");
      errEl.textContent = "生日請填寫完整（民國年、月、日）。";
      errEl.style.display = "block"; return;
    }
    const adY = parseInt(birthY) + 1911;
    birth = String(adY) + String(birthM).padStart(2,"0") + String(birthD).padStart(2,"0");
  }
  const errEl = document.getElementById("qError");
  errEl.style.display = "none";
  if (!name && !phone && !birth) { errEl.textContent = "請至少輸入姓名、電話或生日其中一項。"; errEl.style.display = "block"; return; }
  const btn = document.getElementById("btnQuery");
  btn.disabled = true; btn.textContent = "查詢中...";
  try {
    const data = await xhrPost(API_URL, { action: "adminQueryBookings", name, phone, birth, lineId: state.lineId });
    renderQueryResults(data.bookings || []);
  } catch(e) { errEl.textContent = "查詢未完成，請稍後再試。"; errEl.style.display = "block"; }
  btn.disabled = false; btn.textContent = "查詢";
}

function renderQueryResults(bookings) {
  const el = document.getElementById("queryResults");
  if (bookings.length === 0) { el.innerHTML = `<div style="text-align:center;padding:16px;color:var(--text-light);font-size:13px">🔍 查無預約紀錄</div>`; return; }
  let html = `<div class="divider"></div>`;
  bookings.forEach(function(b) {
    const slotDisplay = b.type === "初診" ? b.checkInTime + "前" : b.slot === "不指定" ? "不指定" : b.slot + "號";
    html += `<div class="result-item">
      <div class="result-header"><div class="result-date">${esc(b.date)} ${esc(b.displayName)}</div><div class="result-status">${esc(b.status)}</div></div>
      <div class="result-detail">${esc(b.name)}　${slotDisplay}　${esc(b.type)}${b.doctor?"　醫師："+esc(b.doctor):""}</div>
      ${b.status!=="已取消"?`<button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="confirmCancel('${esc(b.bookingId)}','${esc(b.name)}','${esc(b.date)}')">取消此預約</button>`:""}
    </div>`;
  });
  el.innerHTML = html;
}

function confirmCancel(bookingId, name, date) {
  state.pendingCancelId = bookingId;
  document.getElementById("cancelConfirmText").textContent = `確定要取消 ${name} 的 ${date} 預約嗎？取消後將自動發送LINE通知給病患。`;
  document.getElementById("cancelError").style.display = "none";
  closeModal("modalQuery");
  openModal("modalCancelConfirm");
}

async function doCancel() {
  const btn = document.getElementById("btnConfirmCancel");
  btn.disabled = true; btn.textContent = "取消中...";
  try {
    const data = await xhrPost(API_URL, { action: "cancelBooking", bookingId: state.pendingCancelId, lineId: state.lineId });
    if (data.success) {
      closeModal("modalCancelConfirm"); openModal("modalQuery");
      document.getElementById("queryResults").innerHTML = `<div class="alert alert-success">預約已取消，LINE通知已發送。</div>`;
    } else { document.getElementById("cancelError").textContent = data.error || "取消未完成，請稍後再試。"; document.getElementById("cancelError").style.display = "block"; }
  } catch(e) { document.getElementById("cancelError").textContent = "取消未完成，請稍後再試。"; document.getElementById("cancelError").style.display = "block"; }
  btn.disabled = false; btn.textContent = "確認取消並發送通知";
}

/* ── 群發訊息 ── */
let bcMode = "range"; // "range" | "single"
function setBcMode(mode) {
  bcMode = mode;
  document.getElementById("bcRangeFields").style.display = mode === "range" ? "block" : "none";
  document.getElementById("bcSingleFields").style.display = mode === "single" ? "block" : "none";
  document.getElementById("bcModeRange").style.background = mode === "range" ? "var(--marigold)" : "#F0F0F0";
  document.getElementById("bcModeRange").style.color = mode === "range" ? "white" : "var(--text-light)";
  document.getElementById("bcModeSingle").style.background = mode === "single" ? "var(--marigold)" : "#F0F0F0";
  document.getElementById("bcModeSingle").style.color = mode === "single" ? "white" : "var(--text-light)";
  document.getElementById("bcPreview").style.display = "none";
  document.getElementById("btnBcSend").style.display = "none";
}

function getBcParams() {
  if (bcMode === "range") {
    const start = document.getElementById("bcStart").value;
    const end = document.getElementById("bcEnd").value;
    return { startDate: start.replace(/-/g,"/"), endDate: end.replace(/-/g,"/") };
  } else {
    const date = document.getElementById("bcSingleDate").value;
    const session = document.getElementById("bcSingleSession").value;
    return { startDate: date.replace(/-/g,"/"), endDate: date.replace(/-/g,"/"), session: session };
  }
}

function validateBcFields(errEl) {
  const message = document.getElementById("bcMessage").value.trim();
  if (bcMode === "range") {
    const start = document.getElementById("bcStart").value;
    const end = document.getElementById("bcEnd").value;
    if (!start || !end || !message) { errEl.textContent = "請確認日期範圍與訊息內容均已填寫。"; return false; }
    if (start > end) { errEl.textContent = "結束日期需在開始日期之後，請重新選擇。"; return false; }
  } else {
    const date = document.getElementById("bcSingleDate").value;
    const session = document.getElementById("bcSingleSession").value;
    if (!date || !session || !message) { errEl.textContent = "請確認日期、時段與訊息內容均已填寫。"; return false; }
  }
  return true;
}

async function doBroadcastPreview() {
  const errEl = document.getElementById("bcError");
  errEl.style.display = "none";
  if (!validateBcFields(errEl)) { errEl.style.display = "block"; return; }
  const btn = document.getElementById("btnBcPreview");
  btn.disabled = true; btn.textContent = "計算中...";
  try {
    const params = Object.assign({ action: "broadcastPreview", lineId: state.lineId }, getBcParams());
    const data = await xhrPost(API_URL, params);
    if (data.success) {
      state.bcPreviewCount = data.count;
      const preview = document.getElementById("bcPreview");
      preview.textContent = `預計發送給 ${data.count} 位病患`; preview.style.display = "block";
      if (data.count > 0) document.getElementById("btnBcSend").style.display = "block";
    } else { errEl.textContent = data.error || "操作未完成，請稍後再試。"; errEl.style.display = "block"; }
  } catch(e) { errEl.textContent = "操作未完成，請稍後再試。"; errEl.style.display = "block"; }
  btn.disabled = false; btn.textContent = "預覽發送人數";
}

async function doBroadcastSend() {
  const message = document.getElementById("bcMessage").value.trim();
  const errEl = document.getElementById("bcError");
  const sucEl = document.getElementById("bcSuccess");
  errEl.style.display = "none"; sucEl.style.display = "none";
  if (!confirm(`確定要發送訊息給 ${state.bcPreviewCount} 位病患嗎？`)) return;
  const btn = document.getElementById("btnBcSend");
  btn.disabled = true; btn.textContent = "發送中...";
  // 顯示全螢幕 Loading Overlay，防止誤觸
  document.getElementById("broadcastOverlay").classList.add("active");
  try {
    const params = Object.assign({ action: "sendAnnouncement", message, lineId: state.lineId }, getBcParams());
    const data = await xhrPost(API_URL, params);
    if (data.success) { sucEl.textContent = `✓ 已成功發送給 ${data.sentCount} 位病患`; sucEl.style.display = "block"; btn.style.display = "none"; document.getElementById("bcPreview").style.display = "none"; }
    else { errEl.textContent = data.error || "操作未完成，請稍後再試。"; errEl.style.display = "block"; }
  } catch(e) { errEl.textContent = "操作未完成，請稍後再試。"; errEl.style.display = "block"; }
  document.getElementById("broadcastOverlay").classList.remove("active");
  btn.disabled = false; btn.textContent = "確認發送";
}

/* ── 資安監控 ── */
async function loadSecurity() {
  const el = document.getElementById("securityContent");
  el.innerHTML = `<div class="loading">載入中...</div>`;
  try {
    const data = await xhrGet(`${API_URL}?action=getSecurityLog&lineId=${state.lineId}`);
    const logs = data.logs || [];
    if (logs.length === 0) { el.innerHTML = `<div class="empty-state">✅ 目前無異常記錄</div>`; return; }
    el.innerHTML = logs.slice(0,50).map(function(log) {
      return `<div class="log-item"><div class="log-time">${esc(log.time)}</div><div style="margin:2px 0;font-size:11px">${esc(log.lineId)}</div><div style="margin:2px 0;font-size:11px">姓名：${esc(log.name)}</div><div class="log-event">${esc(log.event)}</div></div>`;
    }).join("");
  } catch(e) { el.innerHTML = `<div class="alert alert-error">記錄暫時無法載入，請稍後再試。</div>`; }
}
