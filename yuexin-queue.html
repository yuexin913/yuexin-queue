<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>悅心診所 · 看診進度</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #7AAB5A;
    --green-light: #EBF3E4;
    --green-mid: #C5DEB0;
    --gray: #A8A8A0;
    --text: #3A3A35;
    --bg: #F5F7F2;
  }

  body {
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -100px;
    width: 300px; height: 300px;
    background: var(--green-mid);
    opacity: 0.25;
    border-radius: 61% 39% 70% 30% / 45% 55% 45% 55%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; left: -80px;
    width: 260px; height: 260px;
    background: var(--green-mid);
    opacity: 0.2;
    border-radius: 42% 58% 35% 65% / 55% 42% 58% 45%;
    pointer-events: none;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.7s ease both;
  }

  .clinic-name {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.25em;
  }

  .page-title {
    font-size: 11px;
    font-weight: 300;
    color: var(--gray);
    letter-spacing: 0.2em;
    margin-top: 6px;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 320px;
    animation: fadeUp 0.7s ease 0.15s both;
  }

  .card {
    background: #fff;
    border-radius: 24px 8px 24px 8px;
    padding: 28px 12px 22px;
    text-align: center;
    box-shadow: 0 3px 16px rgba(122,171,90,0.12);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--green);
    border-radius: 4px 4px 0 0;
  }

  .card-blob {
    width: 44px; height: 44px;
    background: var(--green-light);
    border-radius: 58% 42% 62% 38% / 44% 56% 44% 56%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
  }

  .card-blob svg {
    width: 22px; height: 22px;
    stroke: var(--green);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
  }

  .card-label {
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .card-number {
    font-family: 'DM Sans', sans-serif;
    font-size: 60px;
    font-weight: 200;
    color: var(--text);
    line-height: 1;
    display: block;
  }

  .card-number.updated {
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0%  { transform: scale(1); }
    50% { transform: scale(1.12); color: var(--green); }
    100%{ transform: scale(1); }
  }

  .status-bar {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 7px;
    animation: fadeIn 0.8s ease 0.3s both;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .dot.connected {
    background: var(--green);
    animation: pulse 2.5s ease infinite;
  }
  .dot.error { background: #E07070; }

  @keyframes pulse {
    0%,100%{ opacity:1 } 50%{ opacity:0.3 }
  }

  .status-text {
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.08em;
  }

  .last-update {
    margin-top: 6px;
    font-size: 10px;
    color: #C0C0BA;
    letter-spacing: 0.06em;
  }

  @keyframes fadeDown {
    from { opacity:0; transform: translateY(-16px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(14px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; } to { opacity:1; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="clinic-name">悅心診所</div>
  <div class="page-title">即時看診進度</div>
</div>

<div class="cards">
  <div class="card">
    <div class="card-blob">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <polyline points="12 7 12 12 15 15"/>
      </svg>
    </div>
    <div class="card-label">1 診</div>
    <span class="card-number" id="call_num_3060">—</span>
  </div>
  <div class="card">
    <div class="card-blob">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <polyline points="12 7 12 12 15 15"/>
      </svg>
    </div>
    <div class="card-label">2 診</div>
    <span class="card-number" id="call_num_3061">—</span>
  </div>
</div>

<div class="status-bar">
  <div class="dot" id="status-dot"></div>
  <span class="status-text" id="status-text">連線中…</span>
</div>
<div class="last-update" id="last-update"></div>

<script>
  var ws_socket = null;
  var WS_CLOSED = 3;

  function setStatus(state) {
    var dot = document.getElementById('status-dot');
    var txt = document.getElementById('status-text');
    dot.className = 'dot ' + state;
    txt.textContent = state === 'connected' ? '即時連線中' : '連線中斷，重試中…';
  }

  function updateTime() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2,'0');
    var m = String(now.getMinutes()).padStart(2,'0');
    var s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('last-update').textContent = '最後更新 ' + h + ':' + m + ':' + s;
  }

  function ws_onmessage(e) {
    try {
      var callers = JSON.parse(e.data);
      callers.forEach(function(item) {
        var el = document.getElementById('call_num_' + item.id);
        if (el && item.call_nums) {
          try {
            var nums = JSON.parse(item.call_nums);
            var newVal = String(nums[0]);
            if (el.textContent !== newVal) {
              el.textContent = newVal;
              el.classList.remove('updated');
              void el.offsetWidth;
              el.classList.add('updated');
            }
          } catch(e) {}
        }
      });
      setStatus('connected');
      updateTime();
    } catch(err) {}
  }

  function wsQueryCaller() {
    ws_socket.send(JSON.stringify({ type: "query", text: "3060,3061" }));
  }

  function ws_onopen()  { wsQueryCaller(); }
  function ws_onclose() { ws_socket = null; setStatus('error'); }
  function ws_onerror() { ws_socket = null; setStatus('error'); }

  function chkWsSocket() {
    try {
      if (!ws_socket || ws_socket.readyState === WS_CLOSED) {
        ws_socket = new WebSocket("wss://www.mainpi.com/.ws_mainpi/?token=ykqk:824a0de7c09c45ee83b515e0d1c4fe87");
        ws_socket.onopen    = ws_onopen;
        ws_socket.onmessage = ws_onmessage;
        ws_socket.onclose   = ws_onclose;
        ws_socket.onerror   = ws_onerror;
      }
    } catch(e) {}
  }

  function QueryCaller() {
    if (ws_socket && ws_socket.readyState === 1) wsQueryCaller();
    else chkWsSocket();
  }

  QueryCaller();
  setInterval(QueryCaller, 30000);
</script>
</body>
</html>
